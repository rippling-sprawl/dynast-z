<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>Historical Trades | Dynast-Z</title>
  <link rel="stylesheet" href="/styles/styles.css">
  <link rel="stylesheet" href="/styles/filters.css">
  <link rel="stylesheet" href="/styles/trades.css">
</head>
<body>
  <div id="header-mount"></div>
  <div id="nav-drawer-mount"></div>
  <script src="/scripts/nav.js"></script>
  <script src="/scripts/tabs.js"></script>
  <script>initPage('Loading trades...');</script>

  <div class="league-content">
    <div id="loading">Loading trades...</div>

    <div id="sections" style="display: none;">
      <div class="tabs" id="tab-bar"></div>

      <div class="filters">
        <select id="filter-team" class="filter-select">
          <option value="">All Teams</option>
        </select>
        <select id="filter-year" class="filter-select">
          <option value="">All Years</option>
        </select>
      </div>
      <div class="trade-count" id="trade-count"></div>
      <div id="trades-list"></div>
    </div>
  </div>

  <script>
    const leagueId = window.location.pathname.match(/\/league\/([^/]+)/)[1];
    let allTrades = [];
    initTabBar(leagueId);

    function parseTradeItem(raw) {
      const posMatch = raw.match(/^(QB|RB|WR|TE|K|DEF)\s+(.+)$/);
      if (posMatch) {
        return { type: 'player', position: posMatch[1], name: posMatch[2] };
      }
      if (/D\/ST|DST/i.test(raw)) {
        return { type: 'player', position: 'DEF', name: raw.replace(/D\/ST|DST/i, '').trim() };
      }
      if (/^\d{4}\s/.test(raw) || /round|pick|1st|2nd|3rd|4th|5th/i.test(raw)) {
        return { type: 'pick', position: 'PICK', name: raw };
      }
      return { type: 'other', position: 'OTHER', name: raw };
    }

    function tradeItemHtml(raw) {
      const item = parseTradeItem(raw);
      return `
        <div class="trade-item">
          <span class="trade-item-pos pos-${item.position}">${item.position === 'PICK' ? 'PK' : item.position}</span>
          <span class="trade-item-name">${item.name}</span>
        </div>
      `;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function renderTrades() {
      const teamFilter = document.getElementById('filter-team').value;
      const yearFilter = document.getElementById('filter-year').value;

      const filtered = allTrades.filter(t => {
        if (teamFilter && t.team_a !== teamFilter && t.team_b !== teamFilter) return false;
        if (yearFilter && String(t.year) !== yearFilter) return false;
        return true;
      });

      document.getElementById('trade-count').textContent = `${filtered.length} trade${filtered.length !== 1 ? 's' : ''}`;

      document.getElementById('trades-list').innerHTML = filtered.map(t => `
        <div class="trade-card">
          <div class="trade-date">${formatDate(t.date)}</div>
          <div class="trade-sides">
            <div class="trade-side">
              <div class="trade-side-header">${t.team_a} <span class="receives-label">receives</span>${t.team_a_display ? `<div class="trade-team-owner">${t.team_a_display}</div>` : ''}</div>
              ${t.team_a_receives.map(tradeItemHtml).join('')}
            </div>
            <div class="trade-side">
              <div class="trade-side-header">${t.team_b} <span class="receives-label">receives</span>${t.team_b_display ? `<div class="trade-team-owner">${t.team_b_display}</div>` : ''}</div>
              ${t.team_b_receives.map(tradeItemHtml).join('')}
            </div>
          </div>
        </div>
      `).join('');
    }

    async function loadTrades() {
      try {
        const resp = await fetch('/api/trades');
        allTrades = await resp.json();
        if (allTrades.error) throw new Error(allTrades.error);

        document.getElementById('header-status').textContent = 'Past Trades';
        document.getElementById('loading').style.display = 'none';
        document.getElementById('sections').style.display = '';

        // Build filter options
        const teams = new Set();
        const years = new Set();
        for (const t of allTrades) {
          teams.add(t.team_a);
          teams.add(t.team_b);
          if (t.year) years.add(t.year);
        }

        const teamSelect = document.getElementById('filter-team');
        [...teams].sort().forEach(name => {
          const opt = document.createElement('option');
          opt.value = name;
          opt.textContent = name;
          teamSelect.appendChild(opt);
        });

        const yearSelect = document.getElementById('filter-year');
        [...years].sort((a, b) => b - a).forEach(year => {
          const opt = document.createElement('option');
          opt.value = year;
          opt.textContent = year;
          yearSelect.appendChild(opt);
        });

        teamSelect.addEventListener('change', renderTrades);
        yearSelect.addEventListener('change', renderTrades);

        renderTrades();
      } catch (e) {
        document.getElementById('loading').textContent = 'Error: ' + e.message;
      }
    }

    loadTrades();
  </script>
</body>
</html>
