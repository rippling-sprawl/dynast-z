<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>3-Ball Setup | Masters 2026</title>
  <link rel="stylesheet" href="/styles/styles.css?v=df002b71">
  <link rel="stylesheet" href="/styles/masters.css?v=14d037d9">
</head>
<body class="masters-body">
  <div id="header-mount"></div>
  <div id="nav-drawer-mount"></div>
  <script src="/scripts/auth.js?v=d20e1128"></script>
  <script src="/scripts/nav.js?v=e48ca5e8"></script>
  <script>initPage();</script>

  <div class="masters-content">
    <div class="masters-breadcrumbs"><a href="/masters">Masters</a><span class="separator">/</span><span>3-Ball Setup</span></div>
    <h2>3-Ball Setup</h2>
    <p class="subtitle">Select your golfer and opponents for each matchup</p>

    <div style="margin-bottom:16px">
      <label style="font-size:10px;color:#444;font-family:monospace;display:block;margin-bottom:6px">ROUND</label>
      <div class="round-selector" id="round-sel"></div>
    </div>

    <div id="loading" class="masters-loading">Loading golfers...</div>
    <div id="groups-container" style="display:none"></div>

    <div id="actions" style="display:none;margin-top:12px">
      <button class="masters-btn" id="add-group">+ Add Group</button>
    </div>

    <a href="/masters/3-ball-results" class="masters-cta" id="view-results" style="display:none">View 3-Ball Results &rarr;</a>
  </div>

  <script src="/scripts/auth.js?v=d20e1128"></script>
  <script src="/scripts/sync.js?v=f19ba045"></script>
  <script src="/scripts/masters-utils.js?v=47f1bd2c"></script>
  <script>
    let allPlayers = [];
    let config = get3BallGroups();
    if (!config.round) config.round = 1;

    function currentGroups() {
      return config.rounds[config.round] || [];
    }

    function setCurrentGroups(groups) {
      config.rounds[config.round] = groups;
    }

    async function init() {
      try {
        const raw = await fetchScores();
        allPlayers = raw.data.player
          .map(p => p.full_name)
          .sort((a, b) => a.localeCompare(b));

        renderRoundSelector();
        renderGroups();
        updateCTA();
        document.getElementById('loading').style.display = 'none';
        document.getElementById('groups-container').style.display = 'block';
        document.getElementById('actions').style.display = 'block';
      } catch (e) {
        document.getElementById('loading').textContent = 'Failed to load: ' + e.message;
      }
    }

    function renderRoundSelector() {
      const container = document.getElementById('round-sel');
      container.innerHTML = [1, 2, 3, 4].map(r => {
        const count = (config.rounds[r] || []).length;
        const badge = count > 0 ? ` (${count})` : '';
        return `<button class="masters-btn ${config.round === r ? 'active' : ''}" data-round="${r}">R${r}${badge}</button>`;
      }).join('');
      container.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          config.round = parseInt(btn.dataset.round);
          save();
          renderRoundSelector();
          renderGroups();
          updateCTA();
        });
      });
    }

    function autocompleteHTML(groupIndex, role, value) {
      return `<div class="autocomplete-wrap" data-group="${groupIndex}" data-role="${role}">
        <input type="text" class="masters-autocomplete" placeholder="Search player..." value="${value || ''}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <button class="autocomplete-clear ${value ? 'visible' : ''}" type="button">&times;</button>
        <ul class="autocomplete-list"></ul>
      </div>`;
    }

    function renderGroups() {
      const groups = currentGroups();
      const container = document.getElementById('groups-container');
      if (groups.length === 0) {
        container.innerHTML = '<p class="masters-empty">No groups for Round ' + config.round + ' yet. Click "+ Add Group" to start.</p>';
        return;
      }

      container.innerHTML = groups.map((g, i) => `
        <div class="group-form">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <span style="font-size:11px;color:#555;font-family:monospace">GROUP ${i + 1}</span>
            <button class="masters-btn danger" data-remove="${i}" style="padding:2px 8px;font-size:11px">&times;</button>
          </div>
          <div class="form-row">
            <label>MY GOLFER</label>
            ${autocompleteHTML(i, 'my', g.myGolfer)}
          </div>
          <div class="form-row">
            <label>OPP 1</label>
            ${autocompleteHTML(i, 'opp0', g.opponents[0])}
          </div>
          <div class="form-row">
            <label>OPP 2</label>
            ${autocompleteHTML(i, 'opp1', g.opponents[1])}
          </div>
        </div>
      `).join('');

      initAutocomplete();

      container.querySelectorAll('[data-remove]').forEach(btn => {
        btn.addEventListener('click', () => {
          const groups = currentGroups();
          groups.splice(parseInt(btn.dataset.remove), 1);
          setCurrentGroups(groups);
          save();
          renderGroups();
        });
      });
    }

    function initAutocomplete() {
      document.querySelectorAll('.autocomplete-wrap').forEach(wrap => {
        const input = wrap.querySelector('.masters-autocomplete');
        const list = wrap.querySelector('.autocomplete-list');
        const clearBtn = wrap.querySelector('.autocomplete-clear');
        const groupIndex = parseInt(wrap.dataset.group);
        const role = wrap.dataset.role;
        let selectedValue = input.value;
        let highlightIndex = -1;

        function setValue(name) {
          selectedValue = name;
          input.value = name;
          clearBtn.classList.toggle('visible', !!name);
          list.classList.remove('open');
          const groups = currentGroups();
          if (role === 'my') groups[groupIndex].myGolfer = name;
          else if (role === 'opp0') groups[groupIndex].opponents[0] = name;
          else if (role === 'opp1') groups[groupIndex].opponents[1] = name;
          save();
        }

        function showSuggestions(query) {
          const q = query.toLowerCase().trim();
          if (!q) { list.classList.remove('open'); return; }
          const matches = allPlayers.filter(name => {
            const parts = name.toLowerCase().split(' ');
            return parts.some(part => part.startsWith(q)) || name.toLowerCase().includes(q);
          }).slice(0, 15);
          if (matches.length === 0) { list.classList.remove('open'); return; }
          highlightIndex = -1;
          list.innerHTML = matches.map((name, idx) =>
            `<li data-index="${idx}" data-name="${name}">${name}</li>`
          ).join('');
          list.classList.add('open');
        }

        input.addEventListener('input', () => {
          selectedValue = '';
          clearBtn.classList.remove('visible');
          showSuggestions(input.value);
          const groups = currentGroups();
          if (role === 'my') groups[groupIndex].myGolfer = '';
          else if (role === 'opp0') groups[groupIndex].opponents[0] = '';
          else if (role === 'opp1') groups[groupIndex].opponents[1] = '';
          save();
        });

        input.addEventListener('focus', () => {
          if (input.value && !selectedValue) showSuggestions(input.value);
          if (selectedValue) input.select();
        });

        input.addEventListener('keydown', (e) => {
          const items = list.querySelectorAll('li');
          if (e.key === 'ArrowDown') {
            e.preventDefault();
            highlightIndex = Math.min(highlightIndex + 1, items.length - 1);
            items.forEach((li, idx) => li.classList.toggle('highlighted', idx === highlightIndex));
            if (items[highlightIndex]) items[highlightIndex].scrollIntoView({ block: 'nearest' });
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            highlightIndex = Math.max(highlightIndex - 1, 0);
            items.forEach((li, idx) => li.classList.toggle('highlighted', idx === highlightIndex));
            if (items[highlightIndex]) items[highlightIndex].scrollIntoView({ block: 'nearest' });
          } else if (e.key === 'Enter') {
            e.preventDefault();
            if (highlightIndex >= 0 && items[highlightIndex]) {
              setValue(items[highlightIndex].dataset.name);
            }
          } else if (e.key === 'Escape') {
            list.classList.remove('open');
            input.blur();
          }
        });

        list.addEventListener('mousedown', (e) => {
          e.preventDefault();
          const li = e.target.closest('li');
          if (li) setValue(li.dataset.name);
        });

        clearBtn.addEventListener('mousedown', (e) => {
          e.preventDefault();
          setValue('');
          input.value = '';
          input.focus();
        });
      });
    }

    document.addEventListener('mousedown', (e) => {
      if (!e.target.closest('.autocomplete-wrap')) {
        document.querySelectorAll('.autocomplete-list.open').forEach(l => l.classList.remove('open'));
      }
    });

    function save() {
      save3BallGroups(config);
      updateCTA();
    }

    function updateCTA() {
      const groups = currentGroups();
      const hasComplete = groups.some(g =>
        g.myGolfer && g.opponents[0] && g.opponents[1]
      );
      document.getElementById('view-results').style.display = hasComplete ? 'block' : 'none';
    }

    document.getElementById('add-group').addEventListener('click', () => {
      const groups = currentGroups();
      groups.push({ myGolfer: '', opponents: ['', ''] });
      setCurrentGroups(groups);
      save();
      renderGroups();
    });

    init();

    // Sync 3-ball groups from server if logged in, then re-render
    initMastersSync().then(result => {
      if (result) {
        config = result.threeBall;
        if (!config.round) config.round = 1;
        if (!config.rounds) config.rounds = {};
        renderRoundSelector();
        renderGroups();
        updateCTA();
      }
    });
  </script>
</body>
</html>
