<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>3-Ball Lookup | Masters 2026</title>
  <link rel="stylesheet" href="/styles/styles.css?v=aeb3671a">
  <link rel="stylesheet" href="/styles/masters.css?v=347a7e50">
</head>
<body class="masters-body">
  <div id="header-mount"></div>
  <div id="nav-drawer-mount"></div>
  <script src="/scripts/auth.js"></script>
  <script src="/scripts/nav.js?v=19e1cd3d"></script>
  <script>initPage();</script>

  <div class="masters-content">
    <div class="masters-breadcrumbs"><a href="/masters">Masters</a><span class="separator">/</span><span>3-Ball Lookup</span></div>
    <h2>3-Ball Lookup</h2>
    <p class="subtitle">View another user's 3-ball results</p>

    <div class="lookup-search">
      <input type="text" id="username-input" placeholder="Enter username" autocapitalize="off" autocorrect="off">
      <button class="masters-btn active" id="search-btn">Search</button>
    </div>

    <div id="error" class="masters-empty" style="display:none"></div>
    <div id="user-results" style="display:none">
      <h3 id="user-label" style="margin:16px 0 8px;color:#ccc"></h3>
      <div class="round-selector" id="round-sel"></div>
      <div id="loading" class="masters-loading" style="display:none">Loading scores...</div>
      <div id="results"></div>
    </div>
  </div>

  <style>
    .lookup-search {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .lookup-search input {
      flex: 1;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #1a1a1a;
      color: #f0f0f0;
      font-size: 14px;
      font-family: inherit;
    }
    .lookup-search input:focus {
      outline: none;
      border-color: #60a5fa;
    }
  </style>

  <script src="/scripts/sync.js"></script>
  <script src="/scripts/masters-utils.js?v=6eaf88a7"></script>
  <script>
    let scoresData = null;
    let lookupConfig = null;
    let selectedRound = 1;
    let lookupUsername = null;

    const input = document.getElementById('username-input');
    const searchBtn = document.getElementById('search-btn');
    const errorEl = document.getElementById('error');
    const userResults = document.getElementById('user-results');

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
      userResults.style.display = 'none';
    }

    function hideError() {
      errorEl.style.display = 'none';
    }

    async function doSearch() {
      const username = input.value.trim();
      if (!username) return;

      hideError();
      userResults.style.display = 'none';

      try {
        const resp = await fetch('/api/lookup?username=' + encodeURIComponent(username));
        const data = await resp.json();

        if (!resp.ok) {
          if (resp.status === 404) {
            showError('No username found');
          } else {
            showError(data.error || 'Something went wrong');
          }
          return;
        }

        lookupUsername = data.username;
        lookupConfig = data.threeBall;
        if (!lookupConfig.rounds) lookupConfig.rounds = {};

        document.getElementById('user-label').textContent = lookupUsername + "'s 3-Ball Results";
        selectedRound = lookupConfig.round || 1;
        userResults.style.display = 'block';
        renderRoundSelector();

        if (!scoresData) {
          document.getElementById('loading').style.display = 'block';
          const raw = await fetchScores();
          scoresData = raw.data;
          document.getElementById('loading').style.display = 'none';
        }

        renderResults();
      } catch (e) {
        showError('Failed to look up user: ' + e.message);
      }
    }

    searchBtn.addEventListener('click', doSearch);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

    function renderRoundSelector() {
      const container = document.getElementById('round-sel');
      container.innerHTML = [1, 2, 3, 4].map(r => {
        const count = (lookupConfig.rounds[r] || []).length;
        const badge = count > 0 ? ` (${count})` : '';
        return `<button class="masters-btn ${selectedRound === r ? 'active' : ''}" data-round="${r}">R${r}${badge}</button>`;
      }).join('');
      container.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          selectedRound = parseInt(btn.dataset.round);
          renderRoundSelector();
          if (scoresData) renderResults();
        });
      });
    }

    function findPlayer(name) {
      return scoresData.player.find(p => p.full_name === name);
    }

    function getRoundScore(player, roundNum) {
      const rKey = 'round' + roundNum;
      const rd = player[rKey];
      if (!rd) return { score: null, thru: null };

      if (rd.roundStatus === 'Playing') {
        return { score: player.today, thru: player.thru };
      }
      if (rd.total !== null && rd.total !== undefined) {
        return { score: rd.fantasy, thru: 'F' };
      }
      if (rd.fantasy !== null && rd.fantasy !== undefined) {
        return { score: rd.fantasy, thru: rd.roundStatus === 'Complete' ? 'F' : player.thru };
      }
      return { score: null, thru: null };
    }

    function renderResults() {
      const container = document.getElementById('results');
      const groups = (lookupConfig.rounds && lookupConfig.rounds[selectedRound]) || [];

      if (groups.length === 0) {
        container.innerHTML = '<p class="masters-empty">' + lookupUsername + ' has no 3-ball selections for Round ' + selectedRound + '</p>';
        return;
      }

      let html = '<div class="three-ball-results-grid">';

      groups.forEach((group) => {
        if (!group.myGolfer) return;

        const myPlayer = findPlayer(group.myGolfer);
        const opponents = (group.opponents || []).filter(Boolean).map(findPlayer).filter(Boolean);

        if (!myPlayer) {
          html += `<div class="three-ball-group"><div class="group-row"><span class="golfer-name" style="color:#f87171">${group.myGolfer} — not found</span></div></div>`;
          return;
        }

        const myResult = getRoundScore(myPlayer, selectedRound);
        const oppResults = opponents.map(opp => ({
          player: opp,
          ...getRoundScore(opp, selectedRound)
        }));

        function toNum(s) { return (s === 'E' || s === 0 || s === '0') ? 0 : (s !== null && s !== undefined ? Number(s) : 999); }
        const myScoreNum = toNum(myResult.score);
        const allOpponentScores = oppResults.map(o => toNum(o.score));
        const bestOpp = Math.min(...allOpponentScores);
        let myStatus = 'tied';
        if (myResult.score !== null && allOpponentScores.length > 0) {
          if (myScoreNum < bestOpp) myStatus = 'winning';
          else if (myScoreNum > bestOpp) myStatus = 'losing';
        }

        html += '<div class="three-ball-group">';
        html += `<div class="results-header"><span>Player</span><span style="text-align:center">R${selectedRound}</span><span style="text-align:right">Thru</span></div>`;

        html += `<div class="group-row my-golfer ${myStatus}">`;
        html += `<span class="golfer-name">${myPlayer.full_name}</span>`;
        html += `<span class="round-score ${scoreClass(myResult.score)}">${formatScore(myResult.score)}</span>`;
        html += `<span class="thru-col">${myResult.thru || ''}</span>`;
        html += '</div>';

        oppResults.forEach(opp => {
          html += '<div class="group-row">';
          html += `<span class="golfer-name" style="font-weight:400;color:#aaa">${opp.player.full_name}</span>`;
          html += `<span class="round-score ${scoreClass(opp.score)}">${formatScore(opp.score)}</span>`;
          html += `<span class="thru-col">${opp.thru || ''}</span>`;
          html += '</div>';
        });

        html += '</div>';
      });

      html += '</div>';
      container.innerHTML = html;
    }
  </script>
</body>
</html>
