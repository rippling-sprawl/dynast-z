<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>Odds | Dynast-Z</title>
  <link rel="stylesheet" href="/styles/styles.css?v=df002b71">
  <link rel="stylesheet" href="/styles/index.css?v=a1b2c3d4">
  <style>
    .index-body {
      background: #f2f1e3;
    }
    /* New Belgium palette + type. Light cream theme, signature orange-red accent,
       heavy uppercase display lettering, sharp (square) corners. Custom web fonts
       fall back to a Helvetica/Arial stack and a system monospace. */
    .odds-wrap {
      --nb-bg: #f2f1e3;
      --nb-surface: #fffafb;
      --nb-ink: #1b2533;
      --nb-ink-soft: #373737;
      --nb-muted: #857550;
      --nb-accent: #d74229;
      --nb-accent-2: #f68b21;
      --nb-line: #ddd8c2;
      --nb-line-soft: #e7e2d0;
      --nb-up: #6f8f1f;
      --nb-down: #d74229;
      --nb-display: "Adso", "ccsamaritanlower-bold", "Helvetica Neue", Arial, sans-serif;
      --nb-body: "futura-pt", "ccsamaritanlower-regular", "Helvetica Neue", Arial, sans-serif;
      --nb-mono: ui-monospace, "SFMono-Regular", Menlo, "Roboto Mono", "Courier New", monospace;
      /* Fixed widths for the pinned name column and each book column. The name
         column stays put (sticky) and wraps; the book columns keep their width
         and scroll horizontally as a group when they don't all fit. */
      --nb-name-w: 124px;
      --nb-col-w: 57px;
    }

    main.home { padding-left: 0; padding-right: 0; background: #f2f1e3; }
    .odds-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 12px 48px;
      background: var(--nb-bg);
      color: var(--nb-ink);
      font-family: var(--nb-body);
    }

    /* Tabs render as a vertical list; once one is chosen the list is replaced
       by breadcrumbs (see .odds-crumbs). */
    .odds-tabs {
      display: flex;
      flex-direction: column;
      margin-bottom: 16px;
    }
    .odds-tab {
      background: none;
      border: none;
      border-bottom: 1px solid var(--nb-line);
      color: var(--nb-ink);
      font-family: var(--nb-display);
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 18px 8px;
      text-align: left;
      cursor: pointer;
      transition: color .15s ease;
    }
    .odds-tab:hover { color: var(--nb-accent); }
    .odds-section {
      padding: 24px 8px 8px;
      color: var(--nb-muted);
      font-family: var(--nb-display);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Breadcrumbs shown in place of the tab list after a selection. */
    /* Breadcrumbs stay pinned (top offset set in JS to clear the site header). */
    .odds-crumbs {
      position: sticky;
      z-index: 50;
      background: var(--nb-bg);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 8px;
      border-bottom: 2px solid var(--nb-ink);
      font-family: var(--nb-display);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .odds-crumb-link {
      background: none;
      border: none;
      color: var(--nb-accent);
      cursor: pointer;
      font: inherit;
      padding: 0;
    }
    .odds-crumb-link:hover { color: var(--nb-ink); }
    .odds-crumb-sep { color: var(--nb-muted); }
    .odds-crumb-current { color: var(--nb-ink); font-weight: 700; }

    /* Coupon = collapsible section.
       Field-based markets (Divisions, Conferences, Super Bowl): the header sits
       above a stack of runner rows. OU-based markets (Player Props): the header
       sits inline with FD/DK price columns. */
    .odds-coupon { border-top: 1px solid var(--nb-line); }
    .odds-coupon-header {
      display: flex;
      align-items: center;
      width: 100%;
      color: var(--nb-ink);
      font-family: var(--nb-display);
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 14px 8px;
      text-align: left;
    }

    /* Field-market body scrolls horizontally as a unit; the runner name column
       (below) is pinned to the left while the book columns scroll. */
    .odds-coupon:not(.is-ou) .odds-coupon-body { overflow-x: auto; }
    /* Field-based runner row: pinned name on the left, fixed-width price columns
       that keep their width (and scroll) rather than shrinking. min-width:100%
       fills narrow rows so the books still right-align when everything fits. */
    .odds-runner {
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      padding: 12px 8px;
      border-top: 1px solid var(--nb-line-soft);
      gap: 12px;
      width: max-content;
      min-width: 100%;
    }
    .odds-runner-name {
      position: sticky;
      left: 0;
      z-index: 2;
      background: var(--nb-bg);
      flex: 0 0 var(--nb-name-w);
      width: var(--nb-name-w);
      display: flex;
      align-items: center;
      color: var(--nb-ink-soft);
      font-size: 13px;
      letter-spacing: .3px;
    }
    /* Header row above field-market runners: just the FD/DK column labels. */
    .odds-field-head { border-top: none; padding-bottom: 2px; }
    .odds-books { display: flex; gap: 8px; flex: 0 0 auto; }
    .odds-book { text-align: center; flex: 0 0 var(--nb-col-w); width: var(--nb-col-w); }
    .odds-book-label {
      font-family: var(--nb-mono);
      font-size: 10px;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--nb-muted);
      margin-bottom: 4px;
    }
    .odds-odds {
      text-align: center;
      color: var(--nb-ink);
      border: 1px solid var(--nb-accent);
      border-radius: 0;
      padding: 8px 10px;
      font-family: var(--nb-mono);
      font-size: 14px;
      font-weight: 600;
    }

    /* OU-based market: a pinned player-name column on the left, then the book
       columns. align-items:stretch makes the name cell as tall as the columns so
       its background fully masks columns scrolling behind it. */
    .odds-coupon.is-ou { display: flex; align-items: stretch; gap: 12px; }
    /* The player name: fixed width, pinned to the left, wraps to two lines. Its
       background hides the book columns that scroll underneath it. */
    .odds-coupon.is-ou .odds-coupon-header {
      position: sticky;
      left: 0;
      z-index: 2;
      background: var(--nb-bg);
      flex: 0 0 calc(var(--nb-name-w) * 1.15);
      width: calc(var(--nb-name-w) * 1.15);
      align-items: center;
      font-size: 14px;
    }
    .odds-coupon.is-ou .odds-coupon-body { flex: 0 0 auto; display: flex; gap: 8px; padding: 8px; align-items: stretch; }
    /* Coupons scroll horizontally as a group; the name column above pins left.
       The pinned FD/DK/SCORE heading row lives outside this container (so it stays
       pinned to the top on vertical scroll) and is kept in horizontal sync by JS. */
    .odds-ou-scroll { overflow-x: auto; }
    .odds-ou-scroll .odds-coupon.is-ou { width: max-content; min-width: 100%; }
    /* The single FD/DK/SCORE heading row pinned above the coupons (top set in JS).
       overflow:hidden makes it a scroll box the JS can pan in sync with the body. */
    .odds-ou-head {
      position: sticky;
      z-index: 49;
      background: var(--nb-bg);
      border-bottom: 1px solid var(--nb-ink);
      overflow: hidden;
    }
    /* Fixed-width book columns: they keep their width and scroll rather than
       shrinking, so FMV/FD/DK/SCORE stay readable however many books there are. */
    .odds-col { display: flex; flex-direction: column; gap: 6px; flex: 0 0 var(--nb-col-w); width: var(--nb-col-w); }
    /* The line value, centered in its column. The deviation arrow is absolutely
       positioned just off its right edge so it rides the same line without
       shifting the value off-center. */
    .odds-line { position: relative; display: inline-block; }
    .odds-arrow {
      position: absolute;
      left: 100%;
      top: 50%;
      transform: translateY(-50%);
      margin-left: 2px;
      font-size: 9px;
      line-height: 1;
    }
    .odds-arrow.up { color: var(--nb-up); }
    .odds-arrow.down { color: var(--nb-down); }
    .odds-col-head {
      font-family: var(--nb-display);
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--nb-muted);
      text-align: center;
      font-weight: 700;
    }
    /* In a heading row each column holds only its col-head; center it vertically
       in the column so it lines up with the (vertically-centered) name label. */
    .odds-ou-head .odds-col,
    .odds-outright-head .odds-col { justify-content: center; }
    /* In the OU layout the label is the badge and the odds sit small inside it.
       Every badge is the same size: full column width (box-sizing keeps padding
       inside that width) and a shared min-height with its content centered, so a
       one-line FMV badge matches a two-line FD/DK badge across every column. */
    .odds-coupon.is-ou .odds-book-label {
      margin-bottom: 0;
      box-sizing: border-box;
      width: 100%;
      min-height: 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--nb-ink);
      padding: 7px 4px;
      font-family: var(--nb-mono);
      font-size: 13px;
      font-weight: 600;
      text-transform: none;
      letter-spacing: 0;
    }
    /* Columns are divided by a single hairline (head + every badge share the
       column's left border) instead of each badge being a bordered box. */
    .odds-coupon.is-ou .odds-col + .odds-col { border-left: 1px solid var(--nb-line); }
    .odds-coupon.is-ou .odds-odds {
      border: none;
      background: none;
      padding: 0;
      margin-top: 4px;
      font-family: var(--nb-mono);
      font-size: 10px;
      letter-spacing: .04em;
      text-transform: uppercase;
      font-weight: 400;
      color: var(--nb-muted);
    }

    /* DK milestone disclosure. The 🪜 toggle is pinned in the (sticky) player
       name cell, so it stays visible as the odds scroll. The panel it reveals
       wraps onto its own full-width flex line below the odds — hence flex-wrap
       on the coupon — and is hidden until toggled. */
    .odds-coupon.is-ou { flex-wrap: wrap; }
    .odds-ms-toggle {
      position: absolute;
      top: 50%;
      right: 6px;
      transform: translateY(-50%);
      z-index: 3;
      background: none;
      border: 0;
      padding: 0;
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      opacity: .5;
      filter: grayscale(.4);
      transition: opacity .15s ease, filter .15s ease;
    }
    .odds-ms-toggle:hover, .odds-ms-toggle.is-open { opacity: 1; filter: none; }
    .odds-ms-panel {
      flex: 1 0 100%;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 16px;
      padding: 10px 8px 12px calc(var(--nb-name-w) * 1.15 + 12px);
      border-top: 1px solid var(--nb-line);
    }
    .odds-ms-panel[hidden] { display: none; }
    .odds-ms-cap {
      font-family: var(--nb-display);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--nb-muted);
    }
    .odds-ms-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      font-family: var(--nb-mono);
    }
    .odds-ms-line { font-size: 13px; font-weight: 600; color: var(--nb-ink); }
    .odds-ms-odds { font-size: 10px; letter-spacing: .04em; color: var(--nb-muted); }

    .odds-status {
      padding: 24px 8px;
      color: var(--nb-muted);
      font-family: var(--nb-display);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Outright (Awards & Futures / Milestones) tables reuse the OU coupon look:
       one is-ou strip per candidate — a pinned name column, then hairline-divided
       borderless badge columns (FMV + each book) — under a single heading row.
       The strips share .odds-coupon.is-ou with player props, so the column
       widths, dividers and badge styling line up identically. */
    .odds-outright-head { border-bottom: 1px solid var(--nb-ink); overflow: hidden; }
    /* The heading's left cell carries the sortable Player/Team label, sized like
       a column head rather than a candidate name (override the is-ou 14px name). */
    .odds-coupon.is-ou .odds-coupon-header.odds-name-head {
      font-family: var(--nb-display);
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--nb-muted);
      font-weight: 700;
    }
    /* The FMV badge reads as a derived value; the shortest (best) book price is
       highlighted for line-shopping at a glance. */
    .odds-coupon.is-ou .odds-book-label.odds-fmv { color: var(--nb-muted); }
    .odds-coupon.is-ou .odds-book-label.odds-best { color: var(--nb-up); font-weight: 700; }
    /* Clickable column headers (name + FMV) that sort the candidate table. */
    .odds-sort { cursor: pointer; user-select: none; }
    .odds-sort:hover { color: var(--nb-accent); }
    .odds-sort-arrow { font-size: 9px; }

    @media (max-width: 600px) {
      .odds-tab { font-size: 12px; }

      /* Tighten the pinned name + book columns so the standard FMV/FD/DK/SCORE
         set fits an iPhone viewport without horizontal scroll. ~92 + 4×42 + gaps
         ≈ 296px, comfortably inside a 390px viewport's content width. The vars
         live on .odds-wrap (not :root), so the override must too — else the
         closer .odds-wrap declaration wins and descendants keep the wide value. */
      .odds-wrap { --nb-name-w: 92px; --nb-col-w: 42px; }

      .odds-coupon.is-ou { gap: 6px; }
      .odds-coupon.is-ou .odds-coupon-body { gap: 6px; padding: 6px; }
      .odds-col { gap: 4px; }

      /* Smaller, tighter OU odds badges (the book-label is the badge). */
      .odds-coupon.is-ou .odds-book-label {
        min-height: 44px;
        padding: 6px 2px;
        font-size: 10px;
      }
      .odds-coupon.is-ou .odds-odds { font-size: 9px; }
      .odds-arrow { font-size: 8px; margin-left: 1px; }
      .odds-col-head { font-size: 10px; letter-spacing: .5px; }

      /* Field markets: tighter row gaps + smaller price badge/labels. */
      .odds-runner { gap: 8px; }
      .odds-books { gap: 6px; }
      .odds-odds { padding: 6px 4px; font-size: 12px; }
      .odds-book-label { font-size: 9px; }

      /* Slightly smaller player/team names on narrow screens. */
      .odds-runner-name { font-size: 12px; }
      .odds-coupon.is-ou .odds-coupon-header { font-size: 13px; }

      /* Narrower name column + 6px coupon gap on mobile; realign the panel. */
      .odds-ms-panel { padding-left: calc(var(--nb-name-w) * 1.15 + 6px); gap: 6px 12px; }
      .odds-ms-toggle { font-size: 12px; right: 4px; }
    }
  </style>
</head>
<body class="index-body">
  <div id="header-mount"></div>
  <div id="nav-drawer-mount"></div>
  <script src="/scripts/auth.js?v=d20e1128"></script>
  <script src="/scripts/nav.js?v=cd972c1a"></script>
  <script>initPage();</script>

  <main class="home">
    <div class="odds-wrap">
      <div class="odds-tabs" id="odds-tabs"></div>
      <div id="odds-content">
        <div class="odds-status">Loading odds…</div>
      </div>
    </div>
  </main>

  <script>
    let LAYOUT = null;
    let MARKETS = null;
    let DK_BY_PLAYER = {};   // normalized player name -> { name, Over:{line,odds}, Under:{line,odds} }
    let SCORE_BY_PLAYER = {}; // same shape, sourced from ESPN ("SCORE") /data/score/*.json
    let OUTRIGHTS = null;     // /data/outrights.json — { markets:{key:{...}}, milestones:{stat:{...}} }
    let MS_BY_PLAYER = {};    // "<norm>|<stat>" -> { name, list:[{line, odds}] } from DK milestones

    // The order the outright groups are shown in, and their section labels.
    const OUTRIGHT_GROUPS = [
      ['awards', 'Awards'],
      ['futures', 'Team Futures'],
      ['leaders', 'Statistical Leaders']
    ];
    // The three price columns an outright row can carry (plus a derived FMV).
    const OUTRIGHT_BOOKS = [['fd', 'FD'], ['dk', 'DK'], ['score', 'SCORE']];

    // Drop the trailing season label (e.g. " 2026-27") from any display string.
    function stripYear(s) {
      return (s || '').replace(/\s*2026-27/g, '');
    }

    function escapeRe(s) {
      return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    // Runner names redundantly repeat the coupon's leading entity, e.g. coupon
    // "Arizona Cardinals - Regular Season Wins" with runner "Arizona Cardinals
    // Over 2.5 Wins". Regex-strip that shared leading title from the runner name.
    function stripMarketTitle(runnerName, couponTitle) {
      const rn = stripYear(runnerName).trim();
      const titleWords = stripYear(couponTitle).trim().split(/\s+/);
      const rnWords = rn.split(/\s+/);
      let i = 0;
      while (i < titleWords.length && i < rnWords.length && titleWords[i] === rnWords[i]) i++;
      if (i === 0) return rn;
      const prefix = rnWords.slice(0, i).map(escapeRe).join('\\s+');
      return rn.replace(new RegExp('^' + prefix + '\\s*'), '').trim() || rn;
    }

    // Coupon titles repeat their card's section title, e.g. card "Regular Season
    // Passing Yards" with coupon "Aaron Rodgers Regular Season Passing Yards".
    // Regex-strip the section title (and any dangling separator) from the coupon.
    function stripSectionTitle(couponTitle, cardTitle) {
      const full = stripYear(couponTitle).trim();
      const section = stripYear(cardTitle).trim();
      if (!section) return full;
      const out = full
        .replace(new RegExp('\\s*' + escapeRe(section) + '\\s*', 'i'), ' ')
        .replace(/^\s*[-–|:]\s*|\s*[-–|:]\s*$/g, '')
        .replace(/\s+/g, ' ')
        .trim();
      return out || full;
    }

    // FanDuel odds come through as a signed integer.
    function fmtAmerican(odds) {
      if (odds === null || odds === undefined) return '—';
      return odds > 0 ? '+' + odds : String(odds);
    }

    // DraftKings odds come through as a string using a unicode minus (−).
    function fmtDk(american) {
      if (!american) return '—';
      return american.replace('−', '-');
    }

    function normName(name) {
      return (name || '')
        .toLowerCase()
        .replace(/\./g, '')
        .replace(/[^a-z\s]/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    // Reduce a market description to its stat, e.g. "Aaron Rodgers Regular Season
    // Passing Yards 2026-27" or the card title "Regular Season Passing Yards" both
    // collapse to "passing yards". Used to match a DraftKings price to the same
    // stat so a QB's passing line never leaks onto, say, a rushing-yards card.
    function statKey(s) {
      return (s || '')
        .toLowerCase()
        .replace(/.*regular season\s*/, '')
        .replace(/[^a-z\s]/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    // A book index is keyed "<normalized name>|<stat>". Names don't match exactly
    // across books (e.g. "Cam Ward" vs "Cameron Ward"), so within the requested
    // stat fall back to a last-name match with a first-name prefix.
    function findIndexedPlayer(index, player, stat) {
      const want = stat || '';
      const exact = normName(player) + '|' + want;
      if (index[exact]) return index[exact];
      const parts = normName(player).split(' ');
      const last = parts[parts.length - 1];
      const first = parts[0];
      for (const k in index) {
        const sep = k.lastIndexOf('|');
        if (k.slice(sep + 1) !== want) continue;
        const kp = k.slice(0, sep).split(' ');
        const kLast = kp[kp.length - 1];
        const kFirst = kp[0];
        if (kLast === last && (kFirst.startsWith(first) || first.startsWith(kFirst))) {
          return index[k];
        }
      }
      return null;
    }
    function findDkPlayer(player, stat) { return findIndexedPlayer(DK_BY_PLAYER, player, stat); }
    function findScorePlayer(player, stat) { return findIndexedPlayer(SCORE_BY_PLAYER, player, stat); }

    // Build a (player + stat)-keyed index of DraftKings prices.
    function buildDkIndex(dk) {
      const marketInfo = {};   // dk marketId -> { player, stat }
      (dk.markets || []).forEach(m => {
        const name = m.name || '';
        const player = name
          .replace(/^NFL[^-]*-\s*/, '')
          .replace(/\s+Regular Season.*$/i, '')
          .trim();
        marketInfo[m.id] = { player, stat: statKey(name) };
      });
      (dk.selections || []).forEach(s => {
        const info = marketInfo[s.marketId];
        if (!info || !info.player) return;
        const dir = s.outcomeType;               // "Over" / "Under"
        if (dir !== 'Over' && dir !== 'Under') return;
        const lineMatch = (s.label || '').match(/([\d.]+)/);
        const key = normName(info.player) + '|' + info.stat;
        if (!DK_BY_PLAYER[key]) DK_BY_PLAYER[key] = { name: info.player };
        DK_BY_PLAYER[key][dir] = {
          line: lineMatch ? lineMatch[1] : null,
          odds: fmtDk((s.displayOdds || {}).american)
        };
      });
    }

    // ESPN ("SCORE") prices come pre-formatted ("-130", "+115"); "Even" is +100.
    function fmtScore(formattedOdds) {
      if (!formattedOdds) return '—';
      const s = String(formattedOdds).trim();
      if (/^even$/i.test(s)) return '+100';
      return s;
    }

    // ESPN files hold one stat each. Walk the nested page tree to every TOTAL
    // market, derive its player/team and the file's stat, and index Over/Under
    // line + price in the same shape as DK_BY_PLAYER so the same matcher works.
    function buildScoreIndex(files) {
      files.forEach(file => {
        const page = file && file.data && file.data.page;
        if (!page) return;
        const stat = statKey(page.title || '');
        (page.pageChildren || []).forEach(sec => {
          (sec.sectionChildren || []).forEach(shelf => {
            (shelf.marketplaceShelfChildren || []).forEach(card => {
              (card.markets || []).forEach(m => {
                // "Fernando Mendoza Total Passing Yards" / "ARI Cardinals Regular Season Wins"
                const player = (m.name || '')
                  .replace(/\s+Total\s+.*$/i, '')
                  .replace(/\s+Regular Season.*$/i, '')
                  .trim();
                if (!player) return;
                const key = normName(player) + '|' + stat;
                (m.selections || []).forEach(s => {
                  const raw = (s.name && s.name.cleanName) || s.type || '';
                  const dir = /^over$/i.test(raw) ? 'Over' : /^under$/i.test(raw) ? 'Under' : null;
                  if (!dir) return;
                  const pts = s.points && s.points.decimalPoints;
                  if (!SCORE_BY_PLAYER[key]) SCORE_BY_PLAYER[key] = { name: player };
                  SCORE_BY_PLAYER[key][dir] = {
                    line: pts != null ? fmtLine(pts) : null,
                    odds: fmtScore(s.odds && s.odds.formattedOdds)
                  };
                });
              });
            });
          });
        });
      });
    }

    // Parse an fd runner like "Lamar Jackson Over 3200.5" into player + direction.
    function parseRunner(runnerName) {
      const m = (runnerName || '').match(/^(.*?)\s+(Over|Under)\s+([\d.]+)\s*$/);
      if (!m) return null;
      return { player: m[1], dir: m[2], line: m[3] };
    }

    // Level 0 — the landing view: a vertical list of every tab. Each navigates
    // by setting the URL hash (#/<tab>) so the path is shareable and survives
    // refresh; the hashchange listener re-renders.
    function renderTabList() {
      const tabsEl = document.getElementById('odds-tabs');
      tabsEl.className = 'odds-tabs';
      tabsEl.innerHTML = '';
      const order = LAYOUT.tabsDisplayOrder || Object.keys(LAYOUT.tabs);

      const addTab = (id) => {
        const tab = LAYOUT.tabs[String(id)];
        const btn = document.createElement('button');
        btn.className = 'odds-tab';
        btn.textContent = tab.title;
        btn.onclick = () => { location.hash = '#/' + id; };
        tabsEl.appendChild(btn);
      };

      // These markets are demoted to a separate "In-Active" section at the bottom.
      const INACTIVE = new Set(['Games', 'Week 1', 'NFL Draft', 'Rams Specials']);
      const active = [], inactive = [];
      order.forEach(id => {
        const tab = LAYOUT.tabs[String(id)];
        if (!tab) return;
        if (!tabHasData(tab)) return;
        (INACTIVE.has(tab.title) ? inactive : active).push(id);
      });

      active.forEach(addTab);

      // Outright markets aren't part of FanDuel's tab layout — they come from
      // /data/outrights.json — so add their entry points here.
      const addCustom = (label, hash) => {
        const btn = document.createElement('button');
        btn.className = 'odds-tab';
        btn.textContent = label;
        btn.onclick = () => { location.hash = hash; };
        tabsEl.appendChild(btn);
      };
      if (OUTRIGHTS && OUTRIGHTS.markets && Object.keys(OUTRIGHTS.markets).length) {
        addCustom('Awards & Futures', '#/awards');
      }
      if (OUTRIGHTS && OUTRIGHTS.milestones && Object.keys(OUTRIGHTS.milestones).length) {
        addCustom('Milestones', '#/milestones');
      }

      if (inactive.length) {
        const section = document.createElement('div');
        section.className = 'odds-section';
        section.textContent = 'In-Active';
        tabsEl.appendChild(section);
        inactive.forEach(addTab);
      }

      document.getElementById('odds-content').innerHTML = '';
      applyStickyTops();
    }

    // Render breadcrumbs into #odds-tabs. Each item is { label, hash }; items with
    // a hash are clickable links, the final item (hash null) is the current page.
    function renderCrumbs(items) {
      const tabsEl = document.getElementById('odds-tabs');
      tabsEl.className = 'odds-crumbs';
      tabsEl.innerHTML = '';
      items.forEach((it, idx) => {
        if (idx > 0) {
          const sep = document.createElement('span');
          sep.className = 'odds-crumb-sep';
          sep.textContent = '›';
          tabsEl.appendChild(sep);
        }
        if (it.hash != null) {
          const link = document.createElement('button');
          link.className = 'odds-crumb-link';
          link.textContent = it.label;
          link.onclick = () => { location.hash = it.hash; };
          tabsEl.appendChild(link);
        } else {
          const cur = document.createElement('span');
          cur.className = 'odds-crumb-current';
          cur.textContent = it.label;
          tabsEl.appendChild(cur);
        }
      });
    }

    // True when every runner is an Over/Under selection (player props), vs a
    // field market that lists entities (teams) to win.
    function couponRunners(couponRef) {
      const coupon = LAYOUT.coupons[String(couponRef.id)];
      const market = coupon && coupon.marketId ? MARKETS[coupon.marketId] : null;
      return (market && market.runners) || [];
    }
    function isOuCoupon(couponRef) {
      const runners = couponRunners(couponRef);
      return runners.length > 0 && runners.every(r => parseRunner(r.runnerName));
    }

    // A card/tab is worth listing only if some coupon under it actually has
    // prices. Fully-empty markets — FanDuel layout entries whose odds never
    // loaded (see docs/NO_MARKET_DATA.md) — are hidden from navigation.
    function cardHasData(card) {
      return !!card && (card.coupons || []).some(ref => couponRunners(ref).length > 0);
    }
    function tabHasData(tab) {
      return !!tab && (tab.cards || []).some(ref => cardHasData(LAYOUT.cards[String(ref.id)]));
    }

    // The single FD/DK heading row, pinned above an OU card's coupons. Mirrors a
    // coupon's is-ou layout (header spacer + body columns) so it lines up. The
    // spacer doubles as a sortable Player label and the FMV head is sortable too;
    // renderCard wires their click handlers and reads back wrap._nameHead/_fmvHead.
    function buildOuHead(showDk) {
      const wrap = document.createElement('div');
      wrap.className = 'odds-coupon is-ou odds-ou-head';
      const nameHead = document.createElement('div');
      nameHead.className = 'odds-coupon-header odds-name-head odds-sort';
      const body = document.createElement('div');
      body.className = 'odds-coupon-body';
      (showDk ? ['FMV', 'FD', 'DK', 'SCORE'] : ['FMV', 'FD']).forEach(label => {
        const col = ouColumn();
        const head = document.createElement('div');
        head.className = 'odds-col-head' + (label === 'FMV' ? ' odds-sort' : '');
        head.textContent = label;
        col.appendChild(head);
        body.appendChild(col);
        if (label === 'FMV') wrap._fmvHead = head;
      });
      wrap._nameHead = nameHead;
      wrap.append(nameHead, body);
      return wrap;
    }

    // A small ▲/▼ sort-direction marker shared by the OU + outright sort headers.
    function sortArrowHtml(dir) {
      return '<span class="odds-sort-arrow">' + (dir === 'asc' ? ' ▲' : ' ▼') + '</span>';
    }

    // Renders a single coupon: title + its market's runners.
    function buildCoupon(couponRef, cardTitle, showDk) {
      const coupon = LAYOUT.coupons[String(couponRef.id)];
      if (!coupon) return null;

      const runners = couponRunners(couponRef);
      // Coupons whose market never loaded its runners carry no prices (see
      // docs/NO_MARKET_DATA.md); hide them rather than render an empty row.
      if (!runners.length) return null;
      // OU markets have Over/Under runners (e.g. "Lamar Jackson Over 3200.5");
      // field markets list entities (e.g. "Buffalo Bills"). They render differently.
      const isOU = isOuCoupon(couponRef);

      const wrap = document.createElement('div');
      wrap.className = 'odds-coupon' + (isOU ? ' is-ou' : '');

      const header = document.createElement('div');
      header.className = 'odds-coupon-header';
      const headerText = stripSectionTitle(coupon.title, cardTitle);
      const spaceIdx = headerText.indexOf(' ');
      if (spaceIdx === -1) {
        header.textContent = headerText;
      } else {
        header.appendChild(document.createTextNode(headerText.slice(0, spaceIdx)));
        header.appendChild(document.createElement('br'));
        header.appendChild(document.createTextNode(headerText.slice(spaceIdx + 1)));
      }
      wrap.appendChild(header);

      const body = document.createElement('div');
      body.className = 'odds-coupon-body';

      let ouMilestones = null;
      if (isOU) {
        // Match DraftKings prices only within this card's stat (e.g. passing
        // yards), so a player's price never leaks across to a different stat.
        const info = buildOuBody(body, runners, showDk, statKey(cardTitle));
        // Stash the coupon's sort keys for renderCard (one player per coupon
        // here; if a coupon ever groups several, the first is representative).
        if (info && info.length) {
          wrap._sortName = info[0].player;
          wrap._sortFmv = info[0].fmv;
          ouMilestones = (info[0].milestones && info[0].milestones.length)
            ? info[0].milestones : null;
        }
      } else {
        buildFieldBody(body, runners, coupon.title, showDk);
      }

      wrap.appendChild(body);
      // A player with DK "Player to Have X+" milestones gets a 🪜 toggle by their
      // name that reveals an (initially hidden) panel listing those thresholds.
      if (ouMilestones) addMilestonePanel(wrap, header, ouMilestones);
      return wrap;
    }

    // FD field markets (Super Bowl, Division/Conference Winners, #1 Seed) list the
    // teams that can win but carry only FanDuel prices. outrights.json holds the
    // same markets with DK/SCORE prices keyed by team, so map an FD coupon title to
    // its outright market key to borrow those columns. Returns null if unmatched.
    function outrightKeyForFieldCoupon(title) {
      const t = stripYear(title || '').toLowerCase();
      if (/super bowl.*\bwinner\b/.test(t)) return 'super_bowl_winner';
      const div = t.match(/\b(afc|nfc)\s+(east|north|south|west)\s+winner\b/);
      if (div) return div[1] + '_' + div[2] + '_winner';
      const champ = t.match(/\b(afc|nfc)\s+championship\s+winner\b/);
      if (champ) return champ[1] + '_winner';
      const seed = t.match(/\b(afc|nfc)\s+number\s*1\s*seed\b/);
      if (seed) return seed[1] + '_1_seed';
      return null;
    }

    // DK/SCORE prices for a field coupon's teams: normName(team) -> { dk, score }.
    // Empty when the coupon has no matching outright market (e.g. finishing orders).
    function fieldBookPrices(couponTitle) {
      const out = {};
      const key = outrightKeyForFieldCoupon(couponTitle);
      const market = key && OUTRIGHTS && OUTRIGHTS.markets && OUTRIGHTS.markets[key];
      if (!market) return out;
      (market.candidates || []).forEach(c => {
        const fdName = c.names && c.names.fd;
        if (!fdName || !c.prices) return;
        out[normName(fdName)] = { dk: c.prices.dk || null, score: c.prices.score || null };
      });
      return out;
    }

    // Field-based market: one row per entity — team name on the left, then FD plus
    // (when showDk) DK and SCORE price columns under a shared header. DK/SCORE come
    // from the matching outright market via fieldBookPrices; a team a book hasn't
    // priced shows a dash.
    function buildFieldBody(body, runners, couponTitle, showDk) {
      const head = document.createElement('div');
      head.className = 'odds-runner odds-field-head';
      head.innerHTML =
        '<span class="odds-runner-name"></span>' +
        '<div class="odds-books">' +
          (showDk ? ['FD', 'DK', 'SCORE'] : ['FD'])
            .map(l => '<div class="odds-book"><div class="odds-col-head">' + l + '</div></div>')
            .join('') +
        '</div>';
      body.appendChild(head);

      const bookPrices = showDk ? fieldBookPrices(couponTitle) : {};

      runners.forEach(r => {
        let odds = null;
        try { odds = r.winRunnerOdds.americanDisplayOdds.americanOdds; } catch (e) {}
        const bp = bookPrices[normName(stripYear(r.runnerName))] || {};

        const row = document.createElement('div');
        row.className = 'odds-runner';
        row.innerHTML =
          '<span class="odds-runner-name">' + stripMarketTitle(r.runnerName, couponTitle) + '</span>' +
          '<div class="odds-books">' +
            '<div class="odds-book"><div class="odds-odds">' + fmtAmerican(odds) + '</div></div>' +
            (showDk ? '<div class="odds-book"><div class="odds-odds">' + fmtDk(bp.dk) + '</div></div>' : '') +
            (showDk ? '<div class="odds-book"><div class="odds-odds">' + fmtDk(bp.score) + '</div></div>' : '') +
          '</div>';
        body.appendChild(row);
      });
    }

    // The Over and Under of a market share the same line, so "O <over> / U <under>"
    // is the price subtext for a cell. A blank side is dropped.
    function ouOddsText(over, under) {
      const parts = [];
      if (over != null && over !== '') parts.push('O ' + over);
      if (under != null && under !== '') parts.push('U ' + under);
      return parts.join('<br>');
    }

    // Lines are clean half-points; FMV is their average, so trim a trailing ".0".
    function fmtLine(n) {
      if (n == null || isNaN(n)) return '';
      const r = Math.round(n * 10) / 10;
      return Number.isInteger(r) ? String(r) : r.toFixed(1);
    }

    // FMV is a computed consensus, always shown to exactly one decimal place so
    // the derived column reads consistently (e.g. "4075.0" alongside "3966.8").
    function fmtFmv(n) {
      return (n == null || isNaN(n)) ? '' : n.toFixed(1);
    }

    // A book's line, plus an up/down arrow when it sits >=2% off fair value.
    function lineWithArrow(lineStr, lineNum, fmv) {
      let arrow = '';
      if (lineNum != null && !isNaN(lineNum) && fmv != null && fmv > 0) {
        if (lineNum >= fmv * 1.02) arrow = '<span class="odds-arrow up">▲</span>';
        else if (lineNum <= fmv * 0.98) arrow = '<span class="odds-arrow down">▼</span>';
      }
      return '<span class="odds-line">' + (lineStr || '') + arrow + '</span>';
    }

    // OU-based market: each column stacks its own Over/Under prices so the
    // runners line up vertically. The FMV/FD/DK headings live once at the top of
    // the card (buildOuHead), not per coupon. showDk is decided at the card level
    // so every coupon keeps the same columns and stays aligned with that heading.
    // FMV (fair market value) is the average of the books' lines, shown first.
    function buildOuBody(body, runners, showDk, stat) {
      const fmvCol = ouColumn();
      const fdCol = ouColumn();
      const dkCol = ouColumn();
      const scoreCol = ouColumn();

      // Collapse runners to one row per player: Over and Under share a line, so
      // the line is per player and the two prices become the cell's subtext.
      const order = [];
      const byPlayer = {};
      runners.forEach(r => {
        const parsed = parseRunner(r.runnerName);
        if (!parsed) return;
        let odds = null;
        try { odds = r.winRunnerOdds.americanDisplayOdds.americanOdds; } catch (e) {}
        if (!byPlayer[parsed.player]) { byPlayer[parsed.player] = { line: parsed.line }; order.push(parsed.player); }
        byPlayer[parsed.player][parsed.dir.charAt(0)] = fmtAmerican(odds);
      });

      // Each player's consensus line, returned so renderCard can sort coupons.
      const info = [];

      order.forEach(player => {
        const row = byPlayer[player];
        // FanDuel contributes a line/price only when it actually priced the player.
        // A synthesized union row (a player FD doesn't carry, sourced from DK/SCORE)
        // has no odds, so FD shows '—' and is left out of the FMV average.
        const hasFd = (row.O && row.O !== '—') || (row.U && row.U !== '—');
        const fdLine = hasFd && row.line != null ? Number(row.line) : null;

        // ESPN ("SCORE") line/prices for the same player + stat. Computed before
        // DK so a milestone fallback can aim at the SCORE line when FD is absent.
        let scLineStr = null, scLineNum = null, scOdds = null;
        if (showDk) {
          const scPlayer = findScorePlayer(player, stat);
          const side = scPlayer && (scPlayer.Over || scPlayer.Under);
          if (side) {
            scLineStr = side.line;
            scLineNum = side.line != null ? Number(side.line) : null;
            scOdds = ouOddsText(scPlayer.Over && scPlayer.Over.odds, scPlayer.Under && scPlayer.Under.odds);
          }
        }

        // DraftKings line/prices for the same player + stat.
        let dkLineStr = null, dkLineNum = null, dkOdds = null;
        // "Player to Have X+" milestones are DK-only, single yes-price thresholds.
        // They're surfaced through a per-player collapsible panel (not the book
        // columns) and, being yes-prices rather than O/U lines, never enter FMV.
        // The list is pre-sorted ascending by threshold.
        let dkMilestones = [];
        if (showDk) {
          const dkPlayer = findDkPlayer(player, stat);
          const side = dkPlayer && (dkPlayer.Over || dkPlayer.Under);
          if (side) {
            dkLineStr = side.line;
            dkLineNum = side.line != null ? Number(side.line) : null;
            dkOdds = ouOddsText(dkPlayer.Over && dkPlayer.Over.odds, dkPlayer.Under && dkPlayer.Under.odds);
          }
          const msEntry = findIndexedPlayer(MS_BY_PLAYER, player, stat);
          if (msEntry && msEntry.list.length) dkMilestones = msEntry.list;
        }

        // FMV = average of whichever book O/U lines are present. Milestone
        // thresholds are yes-prices, not O/U lines, so they never enter FMV.
        const lines = [];
        if (fdLine != null && !isNaN(fdLine)) lines.push(fdLine);
        if (dkLineNum != null && !isNaN(dkLineNum)) lines.push(dkLineNum);
        if (scLineNum != null && !isNaN(scLineNum)) lines.push(scLineNum);
        const fmv = lines.length ? lines.reduce((a, b) => a + b, 0) / lines.length : null;
        // Milestones aren't shown in the book columns — they live in a collapsible
        // panel (built by buildCoupon from this info entry), hidden by default.
        info.push({ player: player, fmv: fmv, milestones: dkMilestones });

        fmvCol.appendChild(ouCell(fmv != null ? fmtFmv(fmv) : '—', ''));
        fdCol.appendChild(hasFd
          ? ouCell(lineWithArrow(row.line, fdLine, fmv), ouOddsText(row.O, row.U))
          : ouCell('', '—'));
        if (showDk) {
          dkCol.appendChild(dkLineStr != null
            ? ouCell(lineWithArrow(dkLineStr, dkLineNum, fmv), dkOdds)
            : ouCell('', '—'));
          scoreCol.appendChild(scLineStr != null
            ? ouCell(lineWithArrow(scLineStr, scLineNum, fmv), scOdds)
            : ouCell('', '—'));
        }
      });

      body.appendChild(fmvCol);
      body.appendChild(fdCol);
      if (showDk) body.appendChild(dkCol);
      if (showDk) body.appendChild(scoreCol);
      return info;
    }

    function ouColumn() {
      const col = document.createElement('div');
      col.className = 'odds-col';
      return col;
    }

    function ouCell(labelText, oddsText) {
      const cell = document.createElement('div');
      cell.className = 'odds-book-label';
      cell.innerHTML = labelText + (oddsText ? '<div class="odds-odds">' + oddsText + '</div>' : '');
      return cell;
    }

    // Appends a 🪜 toggle to a coupon's name header plus a hidden panel (wrapped
    // onto its own full-width flex line below the odds) listing the player's DK
    // "X+" milestone thresholds and yes-prices. Both start hidden; the toggle
    // shows/hides the panel. Milestone prices are plain — no deviation arrows.
    function addMilestonePanel(wrap, header, milestones) {
      const panel = document.createElement('div');
      panel.className = 'odds-ms-panel';
      panel.hidden = true;
      const cap = document.createElement('span');
      cap.className = 'odds-ms-cap';
      cap.textContent = 'DK milestones';
      panel.appendChild(cap);
      milestones.forEach(ms => {
        const item = document.createElement('div');
        item.className = 'odds-ms-item';
        item.innerHTML =
          '<span class="odds-ms-line">' + ms.line + '+</span>' +
          '<span class="odds-ms-odds">' + ms.odds + '</span>';
        panel.appendChild(item);
      });

      const toggle = document.createElement('button');
      toggle.type = 'button';
      toggle.className = 'odds-ms-toggle';
      toggle.textContent = '🪜';
      toggle.title = 'Show milestones';
      toggle.setAttribute('aria-label', 'Toggle milestones');
      toggle.setAttribute('aria-expanded', 'false');
      toggle.onclick = () => {
        const show = panel.hidden;
        panel.hidden = !show;
        toggle.classList.toggle('is-open', show);
        toggle.setAttribute('aria-expanded', String(show));
      };
      header.appendChild(toggle);
      wrap.appendChild(panel);
    }

    // Renders one card: title + each of its coupons.
    // Level 2 — a chosen card: breadcrumbs (Markets › tab › card) + its coupons.
    function renderCard(tabId, cardId) {
      const tab = LAYOUT.tabs[String(tabId)];
      const card = LAYOUT.cards[String(cardId)];
      renderCrumbs([
        { label: 'Markets', hash: '#/' },
        { label: tab ? tab.title : 'Unknown', hash: '#/' + tabId },
        { label: card ? card.title : 'Unknown', hash: null }
      ]);

      const content = document.getElementById('odds-content');
      content.innerHTML = '';
      if (!card) {
        content.innerHTML = '<div class="odds-status">Card not found.</div>';
        return;
      }
      if (!cardHasData(card)) {
        content.innerHTML = '<div class="odds-status">No markets available.</div>';
        return;
      }
      // Every section shows FD and DK columns. OU cards get one shared, pinned
      // FD/DK heading above their coupons; field coupons carry their own header
      // row (built in buildFieldBody) since each lists its own set of entities.
      const showDk = true;
      const ouRefs = (card.coupons || []).filter(isOuCoupon);
      // OU coupons go in one horizontal-scroll container so their fixed-width book
      // columns scroll together while the name column stays pinned. The heading row
      // sits outside it (to stay top-pinned) and is kept in horizontal sync.
      let ouHead = null, ouScroll = null;
      if (ouRefs.length) {
        ouHead = buildOuHead(showDk);
        content.appendChild(ouHead);
        ouScroll = document.createElement('div');
        ouScroll.className = 'odds-ou-scroll';
        ouScroll.addEventListener('scroll', () => { ouHead.scrollLeft = ouScroll.scrollLeft; });
        content.appendChild(ouScroll);
      }

      // Build coupons; OU ones are collected so they can be re-ordered by the
      // sort headers, field ones append straight to the page.
      const ouEls = [];
      (card.coupons || []).forEach(c => {
        const el = buildCoupon(c, card.title, showDk);
        if (!el) return;
        if (ouScroll && isOuCoupon(c)) ouEls.push(el);
        else content.appendChild(el);
      });

      // Sortable OU coupons: same model as the outright tables — default by FMV
      // (highest consensus line first; missing FMV last), FMV head toggles the
      // direction, the Player head cycles asc -> desc -> none (back to FMV).
      if (ouScroll && ouEls.length) {
        const state = { mode: 'fmv', fmvDir: 'desc', nameDir: 'asc' };
        const sorted = () => {
          const r = ouEls.slice();
          if (state.mode === 'name') {
            r.sort((a, b) => (a._sortName || '').localeCompare(b._sortName || ''));
            if (state.nameDir === 'desc') r.reverse();
          } else {
            r.sort((a, b) => {
              const ap = a._sortFmv, bp = b._sortFmv;
              if (ap == null && bp == null) return 0;
              if (ap == null) return 1;
              if (bp == null) return -1;
              return state.fmvDir === 'desc' ? bp - ap : ap - bp;
            });
          }
          return r;
        };
        const renderHead = () => {
          ouHead._nameHead.innerHTML = 'Player' + (state.mode === 'name' ? sortArrowHtml(state.nameDir) : '');
          ouHead._fmvHead.innerHTML = 'FMV' + (state.mode === 'fmv' ? sortArrowHtml(state.fmvDir) : '');
        };
        const renderOrder = () => { sorted().forEach(el => ouScroll.appendChild(el)); };
        ouHead._nameHead.onclick = () => {
          if (state.mode !== 'name') { state.mode = 'name'; state.nameDir = 'asc'; }
          else if (state.nameDir === 'asc') { state.nameDir = 'desc'; }
          else { state.mode = 'fmv'; }            // third click -> back to FMV
          renderHead(); renderOrder();
        };
        ouHead._fmvHead.onclick = () => {
          if (state.mode !== 'fmv') { state.mode = 'fmv'; }
          else { state.fmvDir = state.fmvDir === 'desc' ? 'asc' : 'desc'; }
          renderHead(); renderOrder();
        };
        renderHead();
        renderOrder();
      }

      applyStickyTops();
    }

    // Pin the breadcrumbs below the site header, and the FD/DK head below the
    // breadcrumbs, by measuring their heights (the site header is itself sticky).
    function applyStickyTops() {
      const headerH = (document.querySelector('header') || {}).offsetHeight || 0;
      const crumbs = document.getElementById('odds-tabs');
      const isCrumbs = crumbs.classList.contains('odds-crumbs');
      crumbs.style.top = isCrumbs ? headerH + 'px' : '';
      const ouHead = document.querySelector('.odds-ou-head');
      if (ouHead) ouHead.style.top = (headerH + (isCrumbs ? crumbs.offsetHeight : 0)) + 'px';
    }

    // Level 1 — a chosen tab: breadcrumbs + a vertical list of its cards, each
    // a deeplink (#/<tab>/<card>) styled like the tab list.
    function renderTab(tabId) {
      const tab = LAYOUT.tabs[String(tabId)];
      renderCrumbs([
        { label: 'Markets', hash: '#/' },
        { label: tab ? tab.title : 'Unknown', hash: null }
      ]);

      const content = document.getElementById('odds-content');
      content.innerHTML = '';
      if (!tab) {
        content.innerHTML = '<div class="odds-status">Tab not found.</div>';
        return;
      }
      // Only the cards that actually carry data are navigable.
      const shown = (tab.cards || []).filter(cardRef => {
        const card = LAYOUT.cards[String(cardRef.id)];
        return card && cardHasData(card);
      });
      // A tab with a single child is just a pass-through: skip the one-item list
      // and deep-link straight to that card (replace so Back skips this level).
      if (shown.length === 1) {
        location.replace('#/' + tabId + '/' + shown[0].id);
        return;
      }
      const list = document.createElement('div');
      list.className = 'odds-tabs';
      shown.forEach(cardRef => {
        const card = LAYOUT.cards[String(cardRef.id)];
        const btn = document.createElement('button');
        btn.className = 'odds-tab';
        btn.textContent = card.title || '';
        btn.onclick = () => { location.hash = '#/' + tabId + '/' + cardRef.id; };
        list.appendChild(btn);
      });
      content.appendChild(list);
      applyStickyTops();
    }

    // Map the current URL hash to a view: #/ -> tabs, #/<tab> -> cards,
    // #/<tab>/<card> -> coupons.
    function route() {
      const parts = location.hash.replace(/^#\/?/, '').split('/').filter(Boolean);
      const [tabId, cardId] = parts;
      if (tabId === 'awards') { cardId ? renderOutrightCard(cardId) : renderOutrightList(); return; }
      if (tabId === 'milestones') { cardId ? renderMilestoneStat(cardId) : renderMilestoneList(); return; }
      if (tabId && cardId) renderCard(tabId, cardId);
      else if (tabId) renderTab(tabId);
      else renderTabList();
    }

    // The six season-total player-prop stats. The navigation is built from
    // FanDuel's layout, but each book carries a different subset (FD lacks
    // Receiving TDs, ESPN lacks Rushing TDs, DK has only Passing Yards).
    const UNION_STATS = [
      'Regular Season Passing Yards',
      'Regular Season Passing TDs',
      'Regular Season Rushing Yards',
      'Regular Season Rushing TDs',
      'Regular Season Receiving Yards',
      'Regular Season Receiving TDs'
    ];

    // Two display names are the same player when normalized-equal, or share a last
    // name with one first name a prefix of the other ("Cam"/"Cameron Ward").
    function isSamePlayer(a, b) {
      const na = normName(a), nb = normName(b);
      if (na === nb) return true;
      const pa = na.split(' '), pb = nb.split(' ');
      const la = pa[pa.length - 1], lb = pb[pb.length - 1];
      return la === lb && (pa[0].startsWith(pb[0]) || pb[0].startsWith(pa[0]));
    }

    // Best available line for an index entry (Over and Under share a line).
    function entryLine(entry) {
      const side = (entry.Over && entry.Over.line != null) ? entry.Over : entry.Under;
      return side && side.line != null ? side.line : null;
    }

    // Every player (display name + a line) a book index holds for one stat.
    function indexPlayers(index, stat) {
      const out = [];
      for (const k in index) {
        if (k.slice(k.lastIndexOf('|') + 1) !== stat) continue;
        out.push({ name: index[k].name, line: entryLine(index[k]) });
      }
      return out;
    }

    function sanitizeId(s) {
      return (s || '').toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '');
    }

    // ---- Outright odds math -------------------------------------------------
    // American odds -> implied probability (vig included).
    function americanToProb(american) {
      if (american == null || american === '') return null;
      const n = parseInt(String(american).replace('−', '-'), 10);
      if (isNaN(n) || n === 0) return null;
      return n < 0 ? (-n) / (-n + 100) : 100 / (n + 100);
    }
    // Implied probability -> American odds string.
    function probToAmerican(p) {
      if (p == null || p <= 0 || p >= 1) return null;
      return p >= 0.5 ? '-' + Math.round(100 * p / (1 - p))
                      : '+' + Math.round(100 * (1 - p) / p);
    }
    // FMV consensus = the average of the books' implied probabilities, converted
    // back to American. (A plain average works across every market shape here —
    // mutually-exclusive winners and independent yes/no markets alike.)
    function consensusAmerican(prices) {
      const probs = OUTRIGHT_BOOKS
        .map(([k]) => americanToProb(prices[k]))
        .filter(p => p != null);
      if (!probs.length) return null;
      return probToAmerican(probs.reduce((a, b) => a + b, 0) / probs.length);
    }
    // Prefer the fullest/cleanest display name across books (FD spells team and
    // player names out most completely; fall back to SCORE then DK).
    function outrightName(cand) {
      const n = cand.names || {};
      return n.fd || n.score || n.dk || cand.key || '';
    }
    // The book key with the shortest (best) price in a row, for highlighting.
    function bestBookKey(prices) {
      let best = null, bestP = -1;
      OUTRIGHT_BOOKS.forEach(([k]) => {
        const p = americanToProb(prices[k]);
        if (p != null && p > bestP) { bestP = p; best = k; }
      });
      return best;
    }

    // ---- Milestone index (DK-only "Player to Have X+" lists) ----------------
    // Keyed "<norm name>|<stat>" (stat like "rushing yards") so it matches the
    // player-prop indexes; each player keeps every threshold's over price.
    function buildMilestoneIndex() {
      if (!OUTRIGHTS || !OUTRIGHTS.milestones) return;
      Object.entries(OUTRIGHTS.milestones).forEach(([statFile, m]) => {
        const stat = statFile.replace(/_/g, ' ');     // "rushing_yards" -> "rushing yards"
        Object.entries(m.thresholds || {}).forEach(([th, t]) => {
          (t.candidates || []).forEach(c => {
            const odds = c.prices && c.prices.dk;
            if (!odds) return;
            const name = (c.names && (c.names.dk || c.names.fd || c.names.score)) || '';
            if (!name) return;
            const key = normName(name) + '|' + stat;
            if (!MS_BY_PLAYER[key]) MS_BY_PLAYER[key] = { name: name, list: [] };
            MS_BY_PLAYER[key].list.push({ line: Number(th), odds: fmtDk(odds) });
          });
        });
      });
      Object.values(MS_BY_PLAYER).forEach(e => e.list.sort((a, b) => a.line - b.line));
    }
    // Every milestone player for a stat (with the median threshold as the line)
    // so synthesizeUnion adds rows for players FD/SCORE don't carry.
    function indexMilestonePlayers(stat) {
      const out = [];
      for (const k in MS_BY_PLAYER) {
        if (k.slice(k.lastIndexOf('|') + 1) !== stat) continue;
        const e = MS_BY_PLAYER[k];
        out.push({ name: e.name, line: e.list[Math.floor(e.list.length / 2)].line });
      }
      return out;
    }

    // ---- Outright views -----------------------------------------------------
    // Level 1 — the Awards & Futures landing: market buttons grouped by section.
    function renderOutrightList() {
      renderCrumbs([
        { label: 'Markets', hash: '#/' },
        { label: 'Awards & Futures', hash: null }
      ]);
      const content = document.getElementById('odds-content');
      content.innerHTML = '';
      if (!OUTRIGHTS || !OUTRIGHTS.markets) {
        content.innerHTML = '<div class="odds-status">No outright markets available.</div>';
        return;
      }
      const entries = Object.entries(OUTRIGHTS.markets);
      OUTRIGHT_GROUPS.forEach(([group, label]) => {
        const inGroup = entries.filter(([, m]) => m.group === group);
        if (!inGroup.length) return;
        const section = document.createElement('div');
        section.className = 'odds-section';
        section.textContent = label;
        content.appendChild(section);
        const list = document.createElement('div');
        list.className = 'odds-tabs';
        inGroup.forEach(([key, m]) => {
          const btn = document.createElement('button');
          btn.className = 'odds-tab';
          btn.textContent = m.title;
          btn.onclick = () => { location.hash = '#/awards/' + key; };
          list.appendChild(btn);
        });
        content.appendChild(list);
      });
      applyStickyTops();
    }

    // Level 2 — one outright market: a candidate table with FMV + book columns.
    function renderOutrightCard(key) {
      const market = OUTRIGHTS && OUTRIGHTS.markets && OUTRIGHTS.markets[key];
      renderCrumbs([
        { label: 'Markets', hash: '#/' },
        { label: 'Awards & Futures', hash: '#/awards' },
        { label: market ? market.title : 'Unknown', hash: null }
      ]);
      const content = document.getElementById('odds-content');
      content.innerHTML = '';
      if (!market) {
        content.innerHTML = '<div class="odds-status">Market not found.</div>';
        return;
      }
      content.appendChild(buildOutrightTable(
        market.title, market.candidates, market.kind === 'team' ? 'Team' : 'Player'));
      applyStickyTops();
    }

    // Level 1 — the Milestones landing: one button per stat.
    function renderMilestoneList() {
      renderCrumbs([
        { label: 'Markets', hash: '#/' },
        { label: 'Milestones', hash: null }
      ]);
      const content = document.getElementById('odds-content');
      content.innerHTML = '';
      const ms = OUTRIGHTS && OUTRIGHTS.milestones;
      if (!ms || !Object.keys(ms).length) {
        content.innerHTML = '<div class="odds-status">No milestone markets available.</div>';
        return;
      }
      const list = document.createElement('div');
      list.className = 'odds-tabs';
      Object.entries(ms).forEach(([stat, m]) => {
        const btn = document.createElement('button');
        btn.className = 'odds-tab';
        btn.textContent = m.title;
        btn.onclick = () => { location.hash = '#/milestones/' + stat; };
        list.appendChild(btn);
      });
      content.appendChild(list);
      applyStickyTops();
    }

    // Level 2 — one stat's milestones: a candidate table per threshold.
    function renderMilestoneStat(stat) {
      const m = OUTRIGHTS && OUTRIGHTS.milestones && OUTRIGHTS.milestones[stat];
      renderCrumbs([
        { label: 'Markets', hash: '#/' },
        { label: 'Milestones', hash: '#/milestones' },
        { label: m ? m.title : 'Unknown', hash: null }
      ]);
      const content = document.getElementById('odds-content');
      content.innerHTML = '';
      if (!m) {
        content.innerHTML = '<div class="odds-status">Milestone not found.</div>';
        return;
      }
      const unit = stat.indexOf('tds') !== -1 ? ' TDs' : ' yds';
      Object.keys(m.thresholds)
        .sort((a, b) => Number(a) - Number(b))
        .forEach(th => {
          content.appendChild(buildOutrightTable(
            th + '+' + unit, m.thresholds[th].candidates, 'Player'));
        });
      applyStickyTops();
    }

    // The shared candidate table: market title, a header row of the columns
    // actually present (FMV + whichever books priced this market), then one row
    // per candidate, best price highlighted.
    //
    // Sorting: the default is by FMV (favorites first). Clicking the FMV header
    // flips that direction. Clicking the name header cycles alphabetical
    // asc -> desc -> none, where "none" reverts to the FMV default.
    function buildOutrightTable(title, candidates, nameLabel) {
      nameLabel = nameLabel || 'Player';
      const frag = document.createDocumentFragment();

      // Market/threshold title, styled like an OU card's section heading.
      const section = document.createElement('div');
      section.className = 'odds-section';
      section.textContent = title;
      frag.appendChild(section);

      // Only show book columns some candidate actually carries.
      const present = OUTRIGHT_BOOKS.filter(([k]) =>
        candidates.some(c => c.prices && c.prices[k]));
      const cols = [['fmv', 'FMV']].concat(present);

      // Precompute each row's FMV probability (the sort key) and display name.
      const rows = candidates.map(c => {
        const fmv = consensusAmerican(c.prices || {});
        return { c: c, fmv: fmv, prob: fmv != null ? americanToProb(fmv) : null,
                 name: outrightName(c) };
      });

      // mode 'fmv': sort by prob (fmvDir). mode 'name': alphabetical (nameDir).
      const state = { mode: 'fmv', fmvDir: 'desc', nameDir: 'asc' };

      // The single heading row (FMV/FD/DK/SCORE), mirroring an OU card's is-ou
      // head: a name spacer (here the sortable Player/Team label) + column heads.
      const headWrap = document.createElement('div');
      headWrap.className = 'odds-coupon is-ou odds-outright-head';
      const nameHead = document.createElement('div');
      nameHead.className = 'odds-coupon-header odds-name-head odds-sort';
      const headBody = document.createElement('div');
      headBody.className = 'odds-coupon-body';
      const fmvHeadEls = {};
      cols.forEach(([k, l]) => {
        const col = ouColumn();
        const ch = document.createElement('div');
        ch.className = 'odds-col-head' + (k === 'fmv' ? ' odds-sort' : '');
        ch.textContent = l;
        col.appendChild(ch);
        headBody.appendChild(col);
        if (k === 'fmv') fmvHeadEls.fmv = ch;
      });
      headWrap.append(nameHead, headBody);
      frag.appendChild(headWrap);

      // The candidate strips scroll horizontally as a group; the heading row
      // above is kept in horizontal sync (and clipped) the same way OU cards do.
      const scroll = document.createElement('div');
      scroll.className = 'odds-ou-scroll';
      scroll.addEventListener('scroll', () => { headWrap.scrollLeft = scroll.scrollLeft; });
      frag.appendChild(scroll);

      function sortedRows() {
        const r = rows.slice();
        if (state.mode === 'name') {
          r.sort((a, b) => a.name.localeCompare(b.name));
          if (state.nameDir === 'desc') r.reverse();
        } else {
          // Favorites (highest implied prob) first by default; missing FMV last.
          r.sort((a, b) => {
            if (a.prob == null && b.prob == null) return 0;
            if (a.prob == null) return 1;
            if (b.prob == null) return -1;
            return state.fmvDir === 'desc' ? b.prob - a.prob : a.prob - b.prob;
          });
        }
        return r;
      }

      function arrow(dir) {
        return '<span class="odds-sort-arrow">' + (dir === 'asc' ? ' ▲' : ' ▼') + '</span>';
      }
      function renderHead() {
        nameHead.innerHTML = nameLabel + (state.mode === 'name' ? arrow(state.nameDir) : '');
        fmvHeadEls.fmv.innerHTML = 'FMV' + (state.mode === 'fmv' ? arrow(state.fmvDir) : '');
      }

      // One is-ou strip per candidate: pinned name + a single borderless badge
      // per column (best book price highlighted, FMV muted).
      function renderRows() {
        scroll.innerHTML = '';
        sortedRows().forEach(rec => {
          const prices = rec.c.prices || {};
          const best = bestBookKey(prices);
          const strip = document.createElement('div');
          strip.className = 'odds-coupon is-ou';
          const name = document.createElement('div');
          name.className = 'odds-coupon-header';
          name.textContent = rec.name;
          const body = document.createElement('div');
          body.className = 'odds-coupon-body';
          cols.forEach(([k]) => {
            const col = ouColumn();
            const cell = document.createElement('div');
            if (k === 'fmv') {
              cell.className = 'odds-book-label odds-fmv';
              cell.textContent = rec.fmv || '—';
            } else {
              const val = prices[k];
              cell.className = 'odds-book-label' + (val && k === best ? ' odds-best' : '');
              cell.textContent = val ? fmtDk(val) : '—';
            }
            col.appendChild(cell);
            body.appendChild(col);
          });
          strip.append(name, body);
          scroll.appendChild(strip);
        });
      }

      nameHead.onclick = () => {
        if (state.mode !== 'name') { state.mode = 'name'; state.nameDir = 'asc'; }
        else if (state.nameDir === 'asc') { state.nameDir = 'desc'; }
        else { state.mode = 'fmv'; }              // third click -> back to FMV
        renderHead(); renderRows();
      };
      fmvHeadEls.fmv.onclick = () => {
        if (state.mode !== 'fmv') { state.mode = 'fmv'; }
        else { state.fmvDir = state.fmvDir === 'desc' ? 'asc' : 'desc'; }
        renderHead(); renderRows();
      };

      renderHead();
      renderRows();
      return frag;
    }

    // Make the player-prop markets the union of FD, DK and SCORE. For each stat:
    // reuse FanDuel's card if it has one, else synthesize a card under Player
    // Props; then add a synthetic FD-shaped coupon for every player some other
    // book prices that FanDuel doesn't. Synthetic coupons carry no FD odds, so the
    // existing renderer shows their FD column as '—' and omits FD from the FMV.
    function synthesizeUnion() {
      if (!LAYOUT || !LAYOUT.cards) return;
      const propsTab = Object.values(LAYOUT.tabs).find(t => t.title === 'Player Props');

      UNION_STATS.forEach(title => {
        const stat = statKey(title);

        // FanDuel's card for this stat, or a new one under Player Props.
        let card = Object.values(LAYOUT.cards).find(c => statKey(c.title || '') === stat);
        if (!card) {
          if (!propsTab) return;
          const cid = 'union_card_' + sanitizeId(title);
          card = { id: cid, type: 'OUTRIGHTS', title: title, coupons: [] };
          LAYOUT.cards[cid] = card;
          (propsTab.cards = propsTab.cards || []).push({ id: cid });
        }

        // Players the card already lists (from FanDuel coupons).
        const seen = [];
        (card.coupons || []).forEach(ref => {
          const coup = LAYOUT.coupons[String(ref.id)];
          const market = coup && coup.marketId ? MARKETS[coup.marketId] : null;
          ((market && market.runners) || []).forEach(r => {
            const p = parseRunner(r.runnerName);
            if (p && !seen.some(e => isSamePlayer(e, p.player))) seen.push(p.player);
          });
        });

        // Players only the other books carry, deduped against the card and each
        // other, appended as synthetic FD coupons.
        const candidates = [].concat(
          indexPlayers(DK_BY_PLAYER, stat),
          indexPlayers(SCORE_BY_PLAYER, stat),
          indexMilestonePlayers(stat)
        );
        candidates.forEach(cand => {
          if (cand.line == null || cand.line === '') return;
          if (seen.some(e => isSamePlayer(e, cand.name))) return;
          seen.push(cand.name);
          const id = 'union_' + sanitizeId(stat) + '_' + sanitizeId(cand.name);
          MARKETS[id] = { runners: [
            { runnerName: cand.name + ' Over ' + cand.line },
            { runnerName: cand.name + ' Under ' + cand.line }
          ] };
          LAYOUT.coupons[id] = { id: id, title: cand.name + ' ' + title, marketId: id };
          (card.coupons = card.coupons || []).push({ id: id });
        });
      });
    }

    async function init() {
      // ESPN ("SCORE") odds: one file per stat under /data/score.
      const SCORE_FILES = ['passing_yards', 'passing_tds', 'receiving_yards', 'receiving_tds', 'rushing_yards', 'wins'];
      try {
        const [fdRes, dkRes, outrightsRes] = await Promise.all([
          fetch('/data/fd.json'),
          fetch('/data/dk.json'),
          fetch('/data/outrights.json')
        ]);
        const scorePromises = SCORE_FILES.map(n =>
          fetch('/data/score/' + n + '.json').then(r => r.json()).catch(() => null));
        const data = await fdRes.json();
        LAYOUT = data.layout;
        MARKETS = data.attachments.markets;

        try {
          const dk = await dkRes.json();
          buildDkIndex(dk);
        } catch (e) {
          console.warn('DraftKings data unavailable; showing FanDuel only.', e);
        }

        try {
          const scoreData = (await Promise.all(scorePromises)).filter(Boolean);
          buildScoreIndex(scoreData);
        } catch (e) {
          console.warn('ESPN (SCORE) data unavailable.', e);
        }

        // Outright / award / futures markets + DK milestone lists. The milestone
        // index must be built before synthesizeUnion, which folds milestone-only
        // players into the player-prop union.
        try {
          OUTRIGHTS = await outrightsRes.json();
          buildMilestoneIndex();
        } catch (e) {
          console.warn('Outright/milestone data unavailable.', e);
        }

        // Make the player-prop markets the union of FD, DK and SCORE: add cards for
        // stats only some books carry, and synthetic rows for players FD lacks.
        try {
          synthesizeUnion();
        } catch (e) {
          console.warn('Could not build the union of book markets.', e);
        }

        window.addEventListener('hashchange', route);
        window.addEventListener('resize', applyStickyTops);
        route();
      } catch (err) {
        document.getElementById('odds-content').innerHTML =
          '<div class="odds-status">Failed to load odds data.</div>';
        console.error(err);
      }
    }

    init();
  </script>
</body>
</html>
