<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>Dynast-Z - Trades</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      height: auto;
      overflow: auto;
      padding: 0;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #f0f6fc;
    }

    header a {
      color: #8b949e;
      text-decoration: none;
      font-size: 13px;
    }

    header a:hover { color: #58a6ff; }

    #header-status {
      color: #8b949e;
      font-size: 14px;
    }

    .league-content {
      max-width: 620px;
      margin: 0 auto;
      padding: 16px;
    }

    #loading {
      text-align: center;
      padding: 48px 16px;
      color: #8b949e;
      font-size: 14px;
    }

    .placeholder {
      padding: 24px 16px;
      text-align: center;
      color: #484f58;
      font-size: 14px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid #30363d;
      margin-bottom: 16px;
    }

    .tab {
      display: block;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      color: #8b949e;
      text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab:hover { color: #e1e4e8; }

    .tab.active {
      color: #f0f6fc;
      border-bottom-color: #58a6ff;
    }

    /* Trades filters */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .filter-select {
      background: #21262d;
      border: 1px solid #30363d;
      color: #e1e4e8;
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .filter-select:focus {
      outline: none;
      border-color: #58a6ff;
    }

    .trade-count {
      font-size: 12px;
      color: #484f58;
      margin-bottom: 12px;
    }

    /* Trade card */
    .trade-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .trade-date {
      padding: 8px 16px;
      font-size: 12px;
      color: #8b949e;
      border-bottom: 1px solid #21262d;
    }

    .trade-sides {
      display: flex;
    }

    .trade-side {
      flex: 1;
      padding: 10px 12px;
    }

    .trade-side + .trade-side {
      border-left: 1px solid #21262d;
    }

    .trade-side-header {
      font-size: 14px;
      font-weight: 600;
      color: #e1e4e8;
      margin-bottom: 6px;
    }

    .trade-side-header .receives-label {
      font-weight: 400;
      color: #8b949e;
      font-size: 12px;
    }

    /* Trade items */
    .trade-item {
      display: flex;
      align-items: center;
      padding: 4px 0;
    }

    .trade-item-pos {
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      margin-right: 8px;
      min-width: 26px;
      text-align: center;
      flex-shrink: 0;
    }

    .pos-QB { background: #c2185b; color: #fff; }
    .pos-RB { background: #1565c0; color: #fff; }
    .pos-WR { background: #2e7d32; color: #fff; }
    .pos-TE { background: #e65100; color: #fff; }
    .pos-K  { background: #6a1b9a; color: #fff; }
    .pos-DEF { background: #4e342e; color: #fff; }
    .pos-PICK { background: #21262d; color: #8b949e; }
    .pos-OTHER { background: #21262d; color: #8b949e; }

    .trade-item-name {
      font-size: 13px;
      color: #f0f6fc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Hamburger nav */
    .hamburger {
      background: none;
      border: none;
      color: #8b949e;
      font-size: 22px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      display: flex;
      align-items: center;
    }

    .hamburger:hover { color: #f0f6fc; }

    .nav-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0, 0, 0, 0.5);
    }

    .nav-overlay.open { display: block; }

    .nav-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: 280px;
      max-width: 80vw;
      height: 100%;
      background: #161b22;
      border-left: 1px solid #30363d;
      z-index: 201;
      padding: 16px 0;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.2s ease;
    }

    .nav-overlay.open .nav-drawer {
      transform: translateX(0);
    }

    .nav-drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 12px;
      border-bottom: 1px solid #30363d;
      margin-bottom: 8px;
    }

    .nav-drawer-header h2 {
      font-size: 16px;
      font-weight: 600;
      color: #f0f6fc;
    }

    .nav-close {
      background: none;
      border: none;
      color: #8b949e;
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }

    .nav-close:hover { color: #f0f6fc; }

    .nav-drawer ul {
      list-style: none;
    }

    .nav-drawer li {
      margin: 0;
    }

    .nav-drawer a {
      display: block;
      padding: 10px 20px;
      color: #58a6ff;
      text-decoration: none;
      font-size: 14px;
      transition: background 0.1s;
    }

    .nav-drawer a:hover {
      background: #1c2128;
    }

    .nav-drawer .nav-section-label {
      display: block;
      padding: 10px 20px 4px;
      font-size: 12px;
      font-weight: 600;
      color: #484f58;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .nav-drawer .nav-sub a {
      padding-left: 36px;
      font-size: 13px;
    }

    @media (max-width: 500px) {
      .trade-sides {
        flex-direction: column;
      }

      .trade-side + .trade-side {
        border-left: none;
        border-top: 1px solid #21262d;
      }

      .league-content {
        padding: 12px;
      }

      .tabs {
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <header>
    <div style="display: flex; align-items: center; gap: 12px;">
      <button class="hamburger" id="nav-toggle" aria-label="Menu">&#9776;</button>
      <h1><a href="/" style="color: inherit; text-decoration: none;">Dynast-Z</a></h1>
    </div>
    <span id="header-status">Loading trades...</span>
  </header>

  <div id="nav-drawer-mount"></div>
  <script src="/nav.js"></script>
  <script>initNavDrawer();</script>

  <div class="league-content">
    <div id="loading">Loading trades...</div>

    <div id="sections" style="display: none;">
      <div class="tabs" id="tab-bar"></div>

      <div class="filters">
        <select id="filter-team" class="filter-select">
          <option value="">All Teams</option>
        </select>
        <select id="filter-year" class="filter-select">
          <option value="">All Years</option>
        </select>
      </div>
      <div class="trade-count" id="trade-count"></div>
      <div id="trades-list"></div>
    </div>
  </div>

  <script>
    const leagueId = window.location.pathname.match(/\/league\/([^/]+)/)[1];
    let allTrades = [];

    // Build tab bar
    const tabs = [
      { label: 'Rosters', href: `/league/${leagueId}` },
      { label: 'Past Trades', href: `/league/${leagueId}/trades` },
      { label: 'Trades', href: `/league/${leagueId}/new-trades` },
      { label: 'Power Rankings', href: `/league/${leagueId}/power` },
    ];
    const currentPath = window.location.pathname.replace(/\/$/, '');
    document.getElementById('tab-bar').innerHTML = tabs.map(t => {
      const isActive = currentPath === t.href ? ' active' : '';
      return `<a class="tab${isActive}" href="${t.href}">${t.label}</a>`;
    }).join('');

    function parseTradeItem(raw) {
      const posMatch = raw.match(/^(QB|RB|WR|TE|K|DEF)\s+(.+)$/);
      if (posMatch) {
        return { type: 'player', position: posMatch[1], name: posMatch[2] };
      }
      if (/D\/ST|DST/i.test(raw)) {
        return { type: 'player', position: 'DEF', name: raw.replace(/D\/ST|DST/i, '').trim() };
      }
      if (/^\d{4}\s/.test(raw) || /round|pick|1st|2nd|3rd|4th|5th/i.test(raw)) {
        return { type: 'pick', position: 'PICK', name: raw };
      }
      if (/^\$\d+/i.test(raw)) {
        return { type: 'other', position: 'OTHER', name: raw };
      }
      return { type: 'other', position: 'OTHER', name: raw };
    }

    function tradeItemHtml(raw) {
      const item = parseTradeItem(raw);
      return `
        <div class="trade-item">
          <span class="trade-item-pos pos-${item.position}">${item.position === 'PICK' ? 'PK' : item.position}</span>
          <span class="trade-item-name">${item.name}</span>
        </div>
      `;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function renderTrades() {
      const teamFilter = document.getElementById('filter-team').value;
      const yearFilter = document.getElementById('filter-year').value;

      const filtered = allTrades.filter(t => {
        if (teamFilter && t.team_a !== teamFilter && t.team_b !== teamFilter) return false;
        if (yearFilter && String(t.year) !== yearFilter) return false;
        return true;
      });

      document.getElementById('trade-count').textContent = `${filtered.length} trade${filtered.length !== 1 ? 's' : ''}`;

      document.getElementById('trades-list').innerHTML = filtered.map(t => `
        <div class="trade-card">
          <div class="trade-date">${formatDate(t.date)}</div>
          <div class="trade-sides">
            <div class="trade-side">
              <div class="trade-side-header">${t.team_a} <span class="receives-label">receives</span></div>
              ${t.team_a_receives.map(tradeItemHtml).join('')}
            </div>
            <div class="trade-side">
              <div class="trade-side-header">${t.team_b} <span class="receives-label">receives</span></div>
              ${t.team_b_receives.map(tradeItemHtml).join('')}
            </div>
          </div>
        </div>
      `).join('');
    }

    async function loadTrades() {
      try {
        const resp = await fetch(`/api/league/${leagueId}/transactions`);
        allTrades = await resp.json();
        if (allTrades.error) throw new Error(allTrades.error);

        document.getElementById('header-status').textContent = 'Trades';
        document.getElementById('loading').style.display = 'none';
        document.getElementById('sections').style.display = '';

        // Build filter options
        const teams = new Set();
        const years = new Set();
        for (const t of allTrades) {
          teams.add(t.team_a);
          teams.add(t.team_b);
          if (t.year) years.add(t.year);
        }

        const teamSelect = document.getElementById('filter-team');
        [...teams].sort().forEach(name => {
          const opt = document.createElement('option');
          opt.value = name;
          opt.textContent = name;
          teamSelect.appendChild(opt);
        });

        const yearSelect = document.getElementById('filter-year');
        [...years].sort((a, b) => b - a).forEach(year => {
          const opt = document.createElement('option');
          opt.value = year;
          opt.textContent = year;
          yearSelect.appendChild(opt);
        });

        teamSelect.addEventListener('change', renderTrades);
        yearSelect.addEventListener('change', renderTrades);

        renderTrades();
      } catch (e) {
        document.getElementById('loading').textContent = 'Error: ' + e.message;
      }
    }

    loadTrades();
  </script>
</body>
</html>
