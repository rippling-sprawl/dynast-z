<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>Select Golfers | Dynast-Z</title>
  <link rel="stylesheet" href="/styles/styles.css?v=df002b71">
  <link rel="stylesheet" href="/styles/masters.css?v=14d037d9">
</head>
<body class="masters-body">
  <div id="header-mount"></div>
  <div id="nav-drawer-mount"></div>
  <script src="/scripts/auth.js?v=d20e1128"></script>
  <script src="/scripts/nav.js?v=fb97bdc9"></script>
  <script>initPage();</script>

  <div class="masters-content" style="padding-top:0;padding-bottom:0">
    <div class="lb-sticky-header" id="sticky-header">
      <div class="masters-breadcrumbs" style="padding-bottom:8px"><a id="hub-link" href="#">Tournament</a><span class="separator">/</span><span>Select Golfers</span></div>
      <h2>Select Golfers</h2>
      <p class="subtitle">Pick your winner, top 5, and top 10 finishers</p>
      <a id="lb-link" href="#" class="subtle-link">View Leaderboard &rarr;</a>
      <input type="text" class="masters-search" id="search" placeholder="Search golfers..." style="margin-bottom:0">
    </div>

    <div id="loading" class="masters-loading">Loading golfers...</div>
    <div id="golfer-list" style="display:none">
      <table class="masters-table" id="golfer-table">
        <colgroup><col><col style="width:50px"><col style="width:50px"><col style="width:50px"></colgroup>
        <thead><tr>
          <th>PLAYER</th>
          <th style="text-align:center">WIN</th>
          <th style="text-align:center">T5</th>
          <th style="text-align:center">T10</th>
        </tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

  <script src="/scripts/auth.js?v=d20e1128"></script>
  <script src="/scripts/sync.js?v=f19ba045"></script>
  <script src="/scripts/golf-utils.js?v=267a2ad4"></script>
  <script>
    const info = getTournamentInfo();
    const basePath = '/golf/' + TOURNAMENT_CONTEXT.year + '/' + TOURNAMENT_CONTEXT.tournament;
    document.title = 'Select Golfers | ' + info.name + ' ' + TOURNAMENT_CONTEXT.year;
    document.getElementById('hub-link').textContent = info.name;
    document.getElementById('hub-link').href = basePath;
    document.getElementById('lb-link').href = basePath + '/leaderboard';

    let allPlayers = [];
    let sel = getSelections();

    function setStickyPositions() {
      const siteHeader = document.querySelector('header');
      const stickyHeader = document.getElementById('sticky-header');
      const headerH = siteHeader ? siteHeader.offsetHeight : 0;
      stickyHeader.style.top = headerH + 'px';
      const thTop = headerH + stickyHeader.offsetHeight;
      document.querySelectorAll('.masters-table th').forEach(th => {
        th.style.top = thTop + 'px';
      });
    }

    async function init() {
      try {
        const raw = await fetchScores();
        if (raw.status === 'upcoming') {
          document.getElementById('loading').textContent = 'Tournament has not started yet. Player list will be available closer to the event.';
          return;
        }
        allPlayers = raw.data.player
          .map(p => p.full_name)
          .sort((a, b) => a.localeCompare(b));
        render();
        document.getElementById('loading').style.display = 'none';
        document.getElementById('golfer-list').style.display = 'block';
        setStickyPositions();
      } catch (e) {
        document.getElementById('loading').textContent = 'Failed to load golfers: ' + e.message;
      }
    }

    function render(filter) {
      const rows = document.getElementById('rows');
      const q = (filter || '').toLowerCase();
      const players = q ? allPlayers.filter(n => n.toLowerCase().includes(q)) : allPlayers;

      if (!sel.winner) sel.winner = [];
      if (!sel.top5) sel.top5 = [];
      if (!sel.top10) sel.top10 = [];

      rows.innerHTML = players.map(name => {
        const isWin = sel.winner.includes(name);
        const isT5 = sel.top5.includes(name);
        const isT10 = sel.top10.includes(name);
        const selected = isWin || isT5 || isT10;
        return `<tr class="${selected ? 'selected-golfer' : ''}">
          <td class="player-name">${name}</td>
          <td style="text-align:center"><input type="checkbox" data-cat="winner" data-name="${name}" ${isWin ? 'checked' : ''}></td>
          <td style="text-align:center"><input type="checkbox" data-cat="top5" data-name="${name}" ${isT5 ? 'checked' : ''}></td>
          <td style="text-align:center"><input type="checkbox" data-cat="top10" data-name="${name}" ${isT10 ? 'checked' : ''}></td>
        </tr>`;
      }).join('');

      rows.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        cb.addEventListener('change', () => {
          const name = cb.dataset.name;
          const cat = cb.dataset.cat;
          if (cb.checked) {
            if (!sel[cat].includes(name)) sel[cat].push(name);
          } else {
            sel[cat] = sel[cat].filter(n => n !== name);
          }
          save();
          render(document.getElementById('search').value);
        });
      });
    }

    function save() {
      saveSelections(sel);
    }

    document.getElementById('search').addEventListener('input', e => {
      render(e.target.value);
    });

    setStickyPositions();
    init();

    initTournamentSync().then(result => {
      if (result) { sel = result.selections; render(document.getElementById('search').value); }
    });
  </script>
</body>
</html>
