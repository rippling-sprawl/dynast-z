<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>EV Model | Dynast-Z</title>
  <link rel="stylesheet" href="/styles/base/styles.css?v=abec71e4">
  <link rel="stylesheet" href="/styles/base/hub.css?v=2b363e8e">
  <link rel="stylesheet" href="/styles/primary/golf.css?v=5644a76c">
  <link rel="stylesheet" href="/styles/style/score-colors.css?v=98513287">
</head>
<body class="masters-body">
  <div id="header-mount"></div>
  <div id="nav-drawer-mount"></div>
  <script src="/scripts/base/auth.js?v=a1b2c3d4"></script>
  <script src="/scripts/base/nav.js?v=e5f6a7b8"></script>
  <script>initPage();</script>

  <div class="masters-content">
    <div class="masters-breadcrumbs"><a id="hub-link" href="#">Tournament</a><span class="separator">/</span><span>EV Model</span></div>
    <h2>EV Model</h2>
    <p class="subtitle">Expected value model is available for select tournaments</p>
    <p class="masters-empty" id="status">This feature is not yet available for this tournament.</p>
  </div>

  <script src="/scripts/primary/golf-utils.js?v=9ca7c49f"></script>
  <script>
    const info = getTournamentInfo();
    const basePath = '/golf/' + TOURNAMENT_CONTEXT.year + '/' + TOURNAMENT_CONTEXT.tournament;
    document.title = 'EV Model | ' + info.name + ' ' + TOURNAMENT_CONTEXT.year;
    document.getElementById('hub-link').textContent = info.name;
    document.getElementById('hub-link').href = basePath;

    // Masters 2026 has the EV model — redirect to original page
    if (TOURNAMENT_CONTEXT.tournament === 'masters' && TOURNAMENT_CONTEXT.year === 2026) {
      window.location.replace('/views/masters/ev-model.html');
    }
  </script>
</body>
</html>
