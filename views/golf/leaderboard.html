<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>Leaderboard | Dynast-Z</title>
  <link rel="stylesheet" href="/styles/styles.css?v=df002b71">
  <link rel="stylesheet" href="/styles/masters.css?v=14d037d9">
</head>
<body class="masters-body">
  <div id="header-mount"></div>
  <div id="nav-drawer-mount"></div>
  <script src="/scripts/auth.js?v=d20e1128"></script>
  <script src="/scripts/nav.js?v=e48ca5e8"></script>
  <script>initPage();</script>

  <div class="masters-content" style="padding-top:0;padding-bottom:0">
    <div class="lb-sticky-header" id="sticky-header">
      <div class="masters-breadcrumbs" style="padding-bottom:8px"><a id="hub-link" href="#">Tournament</a><span class="separator">/</span><span>Leaderboard</span></div>
      <div class="masters-page-nav"><a id="link-3ball" href="#">3-Ball Results</a><a id="link-groups" href="#">Group Results</a></div>
      <h2>Leaderboard</h2>
      <p class="subtitle">
        <span class="refresh-badge" id="updated"></span>
      </p>

      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <input type="text" class="masters-search" id="search" placeholder="Search players..." style="margin-bottom:0;">
        <div class="lb-filters">
          <button class="lb-filter-btn mine" data-filter="mine">MINE</button>
          <button class="lb-filter-btn win" data-filter="winner">WIN</button>
          <button class="lb-filter-btn t5" data-filter="top5">T5</button>
          <button class="lb-filter-btn t10" data-filter="top10">T10</button>
          <button class="lb-filter-btn three-ball" data-filter="3ball">3-BALL</button>
        </div>
        <div class="masters-hint" id="tap-hint" style="margin-bottom:0;margin-left:auto;white-space:nowrap">Tap player for details</div>
      </div>
    </div>

    <div id="loading" class="masters-loading">Loading leaderboard...</div>
    <div id="board" style="display:none"></div>
  </div>

  <script src="/scripts/auth.js?v=d20e1128"></script>
  <script src="/scripts/sync.js?v=f19ba045"></script>
  <script src="/scripts/golf-utils.js?v=9ca7c49f"></script>
  <script>
    const info = getTournamentInfo();
    const basePath = '/golf/' + TOURNAMENT_CONTEXT.year + '/' + TOURNAMENT_CONTEXT.tournament;
    document.title = 'Leaderboard | ' + info.name + ' ' + TOURNAMENT_CONTEXT.year;
    document.getElementById('hub-link').textContent = info.name;
    document.getElementById('hub-link').href = basePath;
    document.getElementById('link-3ball').href = basePath + '/3-ball-results';
    document.getElementById('link-groups').href = basePath + '/group-results';

    let scoresData = null;
    let expandedIds = new Set();
    let activeFilters = new Set();

    if (localStorage.getItem('golf_hint_dismissed')) {
      document.getElementById('tap-hint').classList.add('hidden');
    }

    function get3BallMyGolfers() {
      const config = get3BallGroups();
      const roundNum = config.round || 1;
      const groups = (config.rounds && config.rounds[roundNum]) || [];
      const names = new Set();
      for (const g of groups) {
        if (g.myGolfer) names.add(g.myGolfer);
      }
      return names;
    }

    function selectionBadges(name, sel, threeBallNames) {
      let html = '';
      const isWin = sel.winner && sel.winner.includes(name);
      const isT5 = sel.top5 && sel.top5.includes(name);
      const isT10 = sel.top10 && sel.top10.includes(name);
      const is3B = threeBallNames.has(name);
      if (!isWin && !isT5 && !isT10 && !is3B) return '';
      html += '<div class="selection-badges">';
      if (isWin) html += '<span class="sel-badge win">WIN</span>';
      if (isT5) html += '<span class="sel-badge t5">T5</span>';
      if (isT10) html += '<span class="sel-badge t10">T10</span>';
      if (is3B) html += '<span class="sel-badge three-ball">3-BALL</span>';
      html += '</div>';
      return html;
    }

    function setStickyPositions() {
      const siteHeader = document.querySelector('header');
      const stickyHeader = document.getElementById('sticky-header');
      const headerH = siteHeader ? siteHeader.offsetHeight : 0;
      stickyHeader.style.top = headerH + 'px';
      const thTop = headerH + stickyHeader.offsetHeight;
      document.querySelectorAll('.masters-table th').forEach(th => {
        th.style.top = thTop + 'px';
      });
    }

    async function loadAndRender() {
      try {
        const raw = await fetchScores();
        if (raw.status === 'upcoming') {
          document.getElementById('loading').textContent = 'Tournament has not started yet.';
          return;
        }
        scoresData = raw.data;
        renderBoard(document.getElementById('search').value);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('board').style.display = 'block';
        document.getElementById('updated').textContent = 'Updated ' + timeAgo();
      } catch (e) {
        document.getElementById('loading').textContent = 'Failed to load: ' + e.message;
      }
    }

    function getStreakEmoji(player, pars) {
      const rounds = ['round1', 'round2', 'round3', 'round4'];
      const rels = [];
      for (const rKey of rounds) {
        const rd = player[rKey];
        if (!rd || !rd.scores) continue;
        const roundPars = pars[rKey] || [];
        for (let h = 0; h < rd.scores.length; h++) {
          if (rd.scores[h] !== null && rd.scores[h] !== undefined) {
            rels.push(rd.scores[h] - (roundPars[h] || 0));
          }
        }
      }
      if (rels.length < 3) return '';
      const lastThree = rels[rels.length - 1] + rels[rels.length - 2] + rels[rels.length - 3];
      if (lastThree <= -2) return ' \u{1F525}';
      if (lastThree >= 2) return ' \u{1F9CA}';
      return '';
    }

    function renderBoard(filter) {
      const sel = getSelections();
      const threeBallNames = get3BallMyGolfers();
      const q = (filter || '').toLowerCase();
      const allPlayers = sortByToPar(scoresData.player);
      let players = q ? allPlayers.filter(p => p.full_name.toLowerCase().includes(q)) : allPlayers;
      if (activeFilters.size > 0) {
        players = players.filter(p => {
          const n = p.full_name;
          for (const f of activeFilters) {
            if (f === 'mine') {
              if (isSelected(n, sel) || threeBallNames.has(n)) return true;
            } else if (f === '3ball') {
              if (threeBallNames.has(n)) return true;
            } else {
              if (sel[f] && sel[f].includes(n)) return true;
            }
          }
          return false;
        });
      }
      const pars = scoresData.pars;
      const board = document.getElementById('board');

      const activePlayers = players.filter(p => p.status !== 'C');
      const cutPlayers = players.filter(p => p.status === 'C');

      function renderTableRows(list, idPrefix) {
        let html = '';
        list.forEach((p, i) => {
          const selected = isSelected(p.full_name, sel);
          const cls = selected ? 'selected-golfer clickable' : 'clickable';
          const id = idPrefix + i;
          const expanded = expandedIds.has(id);

          html += `<tr class="${cls}" data-id="${id}" data-player="${p.full_name}">`;
          html += `<td>${p.pos || ''}</td>`;
          html += `<td class="player-name">${p.full_name}${getStreakEmoji(p, pars)}</td>`;
          if (!p.today && !p.thru && p.teetime) {
            html += `<td colspan="2" style="text-align:right;color:#888;font-size:11px">${p.teetime}</td>`;
          } else {
            html += `<td class="${scoreClass(p.today)}" style="text-align:right">${formatScore(p.today)}</td>`;
            html += `<td style="text-align:right">${p.thru || ''}</td>`;
          }
          html += `<td class="${scoreClass(p.topar)}" style="font-weight:700;text-align:right">${formatScore(p.topar)}</td>`;
          html += '</tr>';

          html += `<tr class="detail-row" id="${id}" style="display:${expanded ? 'table-row' : 'none'}">`;
          html += '<td colspan="5">';
          html += selectionBadges(p.full_name, sel, threeBallNames);
          html += renderRounds(p, pars);
          html += '</td></tr>';
        });
        return html;
      }

      const cols = '<colgroup><col style="width:42px"><col><col style="width:52px"><col style="width:46px"><col style="width:58px"></colgroup>';
      const thead = '<thead><tr><th>POS</th><th>PLAYER</th><th style="text-align:right">TODAY</th><th style="text-align:right">THRU</th><th style="text-align:right">TO PAR</th></tr></thead>';

      let html = '<table class="masters-table">' + cols + thead + '<tbody>';
      html += renderTableRows(activePlayers, 'lb-');
      html += '</tbody></table>';

      if (cutPlayers.length > 0) {
        html += '<h3 class="cut-heading">CUT</h3>';
        html += '<table class="masters-table">' + cols + thead + '<tbody>';
        html += renderTableRows(cutPlayers, 'cut-');
        html += '</tbody></table>';
      }

      board.innerHTML = html;

      setStickyPositions();

      board.querySelectorAll('tr.clickable').forEach(row => {
        row.addEventListener('click', () => {
          const hint = document.getElementById('tap-hint');
          if (hint && !hint.classList.contains('hidden')) {
            hint.classList.add('hidden');
            localStorage.setItem('golf_hint_dismissed', '1');
          }
          const id = row.dataset.id;
          const detail = document.getElementById(id);
          if (detail.style.display === 'table-row') {
            detail.style.display = 'none';
            expandedIds.delete(id);
          } else {
            detail.style.display = 'table-row';
            expandedIds.add(id);
          }
        });
      });
    }

    function renderRounds(player, pars) {
      const rounds = ['round4', 'round3', 'round2', 'round1'];
      let html = '<div class="rounds-container">';

      rounds.forEach((rKey) => {
        const ri = parseInt(rKey.slice(5)) - 1;
        const rd = player[rKey];
        if (!rd || !rd.scores || rd.scores.every(s => s === null)) return;

        const roundPars = pars[rKey] || [];
        const scores = rd.scores || [];

        html += '<div class="nine-group">';
        html += `<span class="round-label">R${ri + 1}</span>`;

        // Front 9
        html += '<div class="nine-row">';
        html += '<div class="nine-holes">';
        for (let h = 0; h < 9; h++) {
          const s = scores[h];
          const par = roundPars[h];
          html += '<div class="hole-col">';
          html += `<div class="hole-cell hole-header">${h + 1}</div>`;
          if (s === null || s === undefined) {
            html += '<div class="hole-cell no-score">&middot;</div>';
          } else {
            const rel = s - par;
            html += `<div class="hole-cell ${holeClass(rel)}">${formatHoleScore(rel)}</div>`;
          }
          html += `<div class="hole-cell hole-par">${par || ''}</div>`;
          html += '</div>';
        }
        const front = scores.slice(0, 9);
        const frontPlayed = front.filter(s => s !== null && s !== undefined);
        const frontPars = roundPars.slice(0, 9).filter((_, i) => front[i] !== null && front[i] !== undefined);
        const frontRel = frontPlayed.reduce((a, s, i) => a + (s - frontPars[i]), 0);
        html += frontPlayed.length > 0
          ? `<div class="hole-col round-total ${scoreClass(frontRel)}">${formatScore(frontRel)}</div>`
          : '<div class="hole-col round-total"></div>';
        html += '</div></div>';

        // Back 9
        html += '<div class="nine-row">';
        html += '<div class="nine-holes">';
        for (let h = 9; h < 18; h++) {
          const s = scores[h];
          const par = roundPars[h];
          html += '<div class="hole-col">';
          html += `<div class="hole-cell hole-header">${h + 1}</div>`;
          if (s === null || s === undefined) {
            html += '<div class="hole-cell no-score">&middot;</div>';
          } else {
            const rel = s - par;
            html += `<div class="hole-cell ${holeClass(rel)}">${formatHoleScore(rel)}</div>`;
          }
          html += `<div class="hole-cell hole-par">${par || ''}</div>`;
          html += '</div>';
        }
        const back = scores.slice(9, 18);
        const backPlayed = back.filter(s => s !== null && s !== undefined);
        const backPars = roundPars.slice(9, 18).filter((_, i) => back[i] !== null && back[i] !== undefined);
        const backRel = backPlayed.reduce((a, s, i) => a + (s - backPars[i]), 0);
        html += backPlayed.length > 0
          ? `<div class="hole-col round-total ${scoreClass(backRel)}">${formatScore(backRel)}</div>`
          : '<div class="hole-col round-total"></div>';
        html += '</div></div>';

        html += '</div>';
      });

      html += '</div>';
      return html;
    }

    document.getElementById('search').addEventListener('input', e => {
      if (scoresData) renderBoard(e.target.value);
    });

    document.querySelectorAll('.lb-filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const f = btn.dataset.filter;
        if (activeFilters.has(f)) {
          activeFilters.delete(f);
          btn.classList.remove('active');
        } else {
          activeFilters.add(f);
          btn.classList.add('active');
        }
        if (scoresData) renderBoard(document.getElementById('search').value);
      });
    });

    setStickyPositions();
    loadAndRender();
    setInterval(loadAndRender, 11 * 60 * 1000);

    initTournamentSync().then(() => {
      if (scoresData) renderBoard(document.getElementById('search').value);
    });

    // Long-press dialog
    let longPressTimer = null;
    let longPressFired = false;

    function wikiUrl(name) {
      return 'https://en.wikipedia.org/wiki/' + encodeURIComponent(name.replace(/ /g, '_'));
    }

    function showPlayerMenu(name) {
      let dialog = document.getElementById('player-menu');
      if (!dialog) {
        dialog = document.createElement('div');
        dialog.id = 'player-menu';
        dialog.innerHTML = `
          <div class="player-menu-backdrop"></div>
          <div class="player-menu-sheet">
            <div class="player-menu-name"></div>
            <a class="player-menu-item" target="_blank" rel="noopener">Wikipedia</a>
            <button class="player-menu-cancel">Cancel</button>
          </div>`;
        document.body.appendChild(dialog);
        dialog.querySelector('.player-menu-backdrop').addEventListener('click', closePlayerMenu);
        dialog.querySelector('.player-menu-cancel').addEventListener('click', closePlayerMenu);
      }
      dialog.querySelector('.player-menu-name').textContent = name;
      const link = dialog.querySelector('.player-menu-item');
      link.href = wikiUrl(name);
      dialog.classList.add('open');
    }

    function closePlayerMenu() {
      const dialog = document.getElementById('player-menu');
      if (dialog) dialog.classList.remove('open');
    }

    document.getElementById('board').addEventListener('pointerdown', e => {
      const row = e.target.closest('tr.clickable');
      if (!row) return;
      longPressFired = false;
      longPressTimer = setTimeout(() => {
        longPressFired = true;
        showPlayerMenu(row.dataset.player);
      }, 500);
    });

    document.getElementById('board').addEventListener('pointerup', () => {
      clearTimeout(longPressTimer);
    });

    document.getElementById('board').addEventListener('pointercancel', () => {
      clearTimeout(longPressTimer);
    });

    document.getElementById('board').addEventListener('pointermove', e => {
      if (e.pointerType === 'mouse') return;
      clearTimeout(longPressTimer);
    });

    document.getElementById('board').addEventListener('click', e => {
      if (longPressFired) {
        e.stopPropagation();
        longPressFired = false;
      }
    }, true);
  </script>

  <style>
    #player-menu { display: none; }
    #player-menu.open { display: block; }
    .player-menu-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
    }
    .player-menu-sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #1a1a1a;
      border-radius: 12px 12px 0 0;
      padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
      z-index: 1001;
    }
    .player-menu-name {
      font-weight: 700; font-size: 15px;
      color: #f0f0f0;
      padding-bottom: 12px;
      border-bottom: 1px solid #2a2a2a;
      margin-bottom: 8px;
    }
    .player-menu-item {
      display: block;
      padding: 12px 0;
      color: #60a5fa;
      text-decoration: none;
      font-size: 14px;
    }
    .player-menu-cancel {
      display: block; width: 100%;
      margin-top: 8px; padding: 12px 0;
      background: #2a2a2a;
      border: none; border-radius: 8px;
      color: #aaa; font-size: 14px;
      cursor: pointer;
    }
  </style>
</body>
</html>
