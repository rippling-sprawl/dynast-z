<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Asheville Rentals</title>
<style>
  :root {
    --bg: #f2f1e3;        /* warm cream */
    --surface: #fffafb;   /* near-white panels */
    --surface-2: #faf8ec; /* input / header-row fill */
    --ink: #1b2533;       /* primary text */
    --ink-soft: #373737;
    --muted: #857550;     /* warm brown */
    --accent: #d74229;    /* red-orange */
    --accent-2: #f68b21;  /* orange */
    --line: #ddd8c2;
    --line-soft: #e7e2d0;
    --ok: #6f8f1f;        /* olive green */
    --warn: #f68b21;
    --err: #d74229;
    --display: "Adso", "Helvetica Neue", Arial, sans-serif;
    --body: "futura-pt", "Helvetica Neue", Arial, sans-serif;
    --mono: ui-monospace, "SFMono-Regular", Menlo, "Roboto Mono", "Courier New", monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 14px/1.45 var(--body);
  }
  header {
    padding: 18px 22px; border-bottom: 2px solid var(--ink);
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap; background: var(--bg);
  }
  h1 { font-size: 20px; margin: 0; font-weight: 700; letter-spacing: .2px; font-family: var(--display); }
  h1 span { color: var(--muted); font-weight: 400; }
  .grow { flex: 1; }
  a.back { color: var(--accent); text-decoration: none; font-weight: 700; font-family: var(--display); letter-spacing: .3px; font-size: 13px; }
  a.back:hover { text-decoration: underline; }
  .meta { color: var(--muted); font-size: 12.5px; }
  .wrap { padding: 16px 22px 60px; }
  .controls {
    display: flex; gap: 14px; flex-wrap: wrap; align-items: center;
    margin-bottom: 14px; padding: 12px 14px; background: var(--surface); border: 1px solid var(--line); border-radius: 8px;
  }
  .controls label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .4px; display: flex; flex-direction: column; gap: 4px; font-family: var(--display); }
  .controls input, .controls select {
    background: var(--surface-2); color: var(--ink); border: 1px solid var(--line);
    border-radius: 4px; padding: 7px 9px; font-size: 13px; min-width: 90px; font-family: var(--body);
  }
  .controls input:focus, .controls select:focus { outline: none; border-color: var(--accent); }
  .controls input[type=text] { min-width: 180px; }
  @media (max-width: 640px) {
    .controls { flex-direction: column; align-items: stretch; }
    .controls label { width: 100%; }
    .controls input, .controls select { width: 100%; }
  }
  .sources { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .chip {
    background: var(--surface); border: 1px solid var(--line); border-radius: 999px;
    padding: 5px 11px; font-size: 12px; display: flex; gap: 7px; align-items: center;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .dot.ok { background: var(--ok); } .dot.empty { background: var(--warn); } .dot.error { background: var(--err); }
  .chip .c { color: var(--muted); }
  .tablebox { overflow-x: auto; border: 1px solid var(--line); border-radius: 8px; background: var(--surface); }
  table { border-collapse: collapse; width: 100%; min-width: 1100px; }
  thead th {
    position: sticky; top: 0; background: var(--surface-2); text-align: left;
    padding: 10px 12px; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px;
    border-bottom: 2px solid var(--ink); cursor: pointer; white-space: nowrap; user-select: none; font-family: var(--display);
  }
  thead th:hover { color: var(--ink); }
  thead th .ar { color: var(--accent); margin-left: 4px; }
  tbody td { padding: 9px 12px; border-bottom: 1px solid var(--line-soft); white-space: nowrap; }
  tbody tr:hover { background: var(--surface-2); }
  td.complex { font-weight: 600; white-space: normal; min-width: 150px; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; font-family: var(--mono); }
  td.price { text-align: right; font-variant-numeric: tabular-nums; font-family: var(--mono); }
  .small { color: var(--muted); font-size: 12px; }
  thead th.fees-toggle { color: var(--accent); }
  thead th.fees-toggle:hover { color: var(--err); }
  .fee-grip { color: var(--accent); font-weight: 700; }
  td.fee-col { background: var(--surface-2); }
  thead th.fee-col { background: #f3e7cf; }
  td.fees-cell { text-align: center; color: var(--muted); letter-spacing: 2px; }
  a.site { color: var(--accent); text-decoration: none; font-weight: 600; }
  a.site:hover { text-decoration: underline; }
  .empty-note { padding: 40px; text-align: center; color: var(--muted); }
  .refresh {
    font-family: var(--display); font-size: 12px; font-weight: 700; letter-spacing: .3px;
    color: #fff; background: var(--accent); border: 1px solid var(--accent);
    border-radius: 6px; padding: 8px 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
  }
  .refresh:hover { background: var(--err); }
  .refresh:disabled { opacity: .6; cursor: default; }
  .spin {
    width: 12px; height: 12px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff;
    border-radius: 50%; display: inline-block; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <a class="back" href="/jane">← Jane</a>
  <h1>Asheville Rentals</h1>
  <div class="grow"></div>
  <div class="meta" id="freshness">No data yet</div>
  <button class="refresh" id="refreshBtn" hidden>Refresh all sources</button>
</header>

<div class="wrap">
  <div class="controls">
    <label>Search<input type="text" id="q" placeholder="complex, floorplan, unit…" /></label>
    <label>Beds
      <select id="beds">
        <option value="">Any</option><option value="0">Studio</option>
        <option value="1">1</option><option value="2">2</option><option value="3">3+</option>
      </select>
    </label>
    <label>Max price<input type="number" id="maxp" placeholder="e.g. 1450" step="50" /></label>
    <label>W/D
      <select id="wd"><option value="">Any</option><option value="In-unit">In-unit</option><option value="Hookups">Hookups</option><option value="Community">Community</option></select>
    </label>
  </div>

  <div class="sources" id="sources"></div>

  <div class="tablebox">
    <table>
      <thead><tr id="head"></tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
  <div class="empty-note" id="emptyNote" style="display:none">No listings match your filters.</div>
</div>

<script>
function normalizeAvailable(v) {
  if (!v) return "—";
  const s = v.trim();
  if (/^(available\s*now|available|now)$/i.test(s)) return "Now";
  // Drop a leading "Available " and any trailing year: "Aug 4, 2026" -> "Aug 4".
  return s.replace(/^available\s+/i, "").replace(/,?\s*\d{4}$/, "");
}

// Heatmap fill across the visible rows: dark green at the lowest value, dark red
// at the highest, fading to transparent at the midpoint. Strong poles flip the
// text to white for contrast.
function heatStyle(v, min, max) {
  if (v == null || !isFinite(v) || min === max) return "";
  const t = (v - min) / (max - min);   // 0 = lowest, 1 = highest
  const d = (t - 0.5) * 2;             // -1 .. 1, 0 at the midpoint
  const a = Math.abs(d);               // 0 transparent -> 1 fully tinted
  const rgb = d < 0 ? "29, 120, 56" : "183, 33, 27"; // green low / red high
  const text = a >= 0.6 ? "color:#fff;" : "";
  return ` style="${text}background:rgba(${rgb}, ${a.toFixed(2)})"`;
}

const COLS = [
  { key: "complex",        label: "Complex", cls: "complex", disp: r => {
      const fpTxt = r.floorplan || (r.officialUrl ? "site ↗" : "");
      const fp = r.officialUrl && fpTxt
        ? `<a class="site" target="_blank" rel="noopener" href="${r.officialUrl}">${fpTxt}</a>` : fpTxt;
      const sub = [fp, r.unit].filter(Boolean).join(" · ");
      return `${r.complex}`
           + (sub ? `<div class="small">${sub}</div>` : "")
           + (r.note ? `<div class="small">${r.note}</div>` : "");
    } },
  { key: "price",          label: "Price",    num: true, cls: "price", disp: r => r.priceText },
  { key: "beds",           label: "Beds",     num: true },
  { key: "baths",          label: "Baths",    num: true },
  { key: "sqft",           label: "SqFt",     num: true, disp: r => r.sqftText || "—" },
  { key: "pricePerSqft",   label: "$ / SqFt", num: true, heat: true, disp: r => r.pricePerSqft == null ? "—" : "$" + r.pricePerSqft.toFixed(2) },
  { key: "available",      label: "Available", disp: r => normalizeAvailable(r.available) },
  // { key: "outdoor",        label: "Outdoor Space", disp: r => /yes/i.test(r.outdoor || "") ? "✓" : "—" },
  { key: "washerDryerType",label: "W/D type" },
  { fees: true },
];

const FEE_COLS = [
  { key: "petFee",         label: "Pet fee" },
  { key: "parkingFee",     label: "Parking fee" },
  { key: "washerDryerFee", label: "W/D fee" },
];

let feesExpanded = false;

let DATA = { listings: [], sources: [], generatedAt: null };
let sort = { key: "price", dir: 1 };

const $ = (id) => document.getElementById(id);

function fmtAgo(iso) {
  if (!iso) return "No data yet";
  const d = new Date(iso), s = (Date.now() - d) / 1000;
  let ago = "just now";
  if (s > 60) ago = Math.round(s / 60) + " min ago";
  if (s > 3600) ago = Math.round(s / 3600) + " hr ago";
  if (s > 86400) ago = Math.round(s / 86400) + " d ago";
  return "Snapshot " + d.toLocaleString() + " · " + ago;
}

function renderHead() {
  const ths = [];
  COLS.forEach(c => {
    if (c.fees) {
      if (feesExpanded) {
        FEE_COLS.forEach((fc, i) => {
          const lbl = i === 0 ? `<span class="fee-grip">Fees ▾</span> ${fc.label}` : fc.label;
          ths.push(`<th class="fee-col fees-toggle">${lbl}</th>`);
        });
      } else {
        ths.push(`<th class="fees-toggle">Fees ▸</th>`);
      }
      return;
    }
    const active = sort.key === c.key;
    const ar = active ? `<span class="ar">${sort.dir > 0 ? "▲" : "▼"}</span>` : "";
    ths.push(`<th data-k="${c.key}" ${c.sortable === false ? 'style="cursor:default"' : ""}>${c.label}${ar}</th>`);
  });
  $("head").innerHTML = ths.join("");
  $("head").querySelectorAll("th").forEach(th => {
    if (th.classList.contains("fees-toggle")) {
      th.onclick = () => { feesExpanded = !feesExpanded; render(); };
      return;
    }
    const k = th.dataset.k;
    const col = COLS.find(c => c.key === k);
    if (col && col.sortable === false) return;
    th.onclick = () => { if (sort.key === k) sort.dir *= -1; else sort = { key: k, dir: k === "price" || k === "beds" || k === "sqft" || k === "baths" ? 1 : 1 }; render(); };
  });
}

// function renderSources() {
//   $("sources").innerHTML = DATA.sources.map(s => {
//     const label = s.status === "ok" ? `${s.count} live` : s.status === "empty" ? "no live data" : "error";
//     const t = s.error ? ` — ${s.error}` : ` — ${s.method || ""}`;
//     return `<div class="chip" title="${(s.method || "") + t}"><span class="dot ${s.status}"></span>${s.name}<span class="c">${label}</span></div>`;
//   }).join("");
// }

function passesFilter(r) {
  // Baseline: never show units priced above $1700 (null-price listings stay).
  if (r.price != null && r.price > 1700) return false;
  // Baseline: require at least 650 sqft when sqft is known (unknown stays).
  if (r.sqft != null && r.sqft < 650) return false;
  const q = $("q").value.trim().toLowerCase();
  if (q) {
    const hay = `${r.complex} ${r.floorplan || ""} ${r.unit || ""}`.toLowerCase();
    if (!hay.includes(q)) return false;
  }
  const beds = $("beds").value;
  if (beds !== "") {
    if (beds === "3") { if (!(r.beds >= 3)) return false; }
    else if (String(r.beds) !== beds) return false;
  }
  const maxp = parseFloat($("maxp").value);
  if (!isNaN(maxp)) { if (r.price == null || r.price > maxp) return false; }
  // Always require outdoor space: include "yes" and unknown, exclude explicit "no".
  if (r.outdoor && !/yes/i.test(r.outdoor)) return false;
  const wd = $("wd").value;
  if (wd && r.washerDryerType !== wd) return false;
  return true;
}

function render() {
  renderHead();
  const rows = DATA.listings.filter(passesFilter);
  const k = sort.key, dir = sort.dir;
  const col = COLS.find(c => c.key === k);
  rows.sort((a, b) => {
    let x = a[k], y = b[k];
    if (col && col.num) { // nulls last regardless of direction
      if (x == null && y == null) return 0;
      if (x == null) return 1;
      if (y == null) return -1;
      return (x - y) * dir;
    }
    x = (x ?? "").toString().toLowerCase();
    y = (y ?? "").toString().toLowerCase();
    return x < y ? -dir : x > y ? dir : 0;
  });

  // Min/max per heatmap column over the currently visible rows.
  const heatRanges = {};
  COLS.forEach(c => {
    if (!c.heat) return;
    const vals = rows.map(r => r[c.key]).filter(v => v != null && isFinite(v));
    heatRanges[c.key] = vals.length ? [Math.min(...vals), Math.max(...vals)] : null;
  });

  $("rows").innerHTML = rows.map(r => "<tr>" + COLS.map(c => {
    if (c.fees) {
      if (feesExpanded) {
        return FEE_COLS.map(fc => {
          let v = r[fc.key];
          v = (v == null || v === "") ? "—" : v;
          return `<td class="fee-col">${v}</td>`;
        }).join("");
      }
      return `<td class="fees-cell">···</td>`;
    }
    let v;
    if (c.disp) v = c.disp(r);
    else if (c.key === "beds") v = r.beds == null ? "—" : (r.beds === 0 ? "Studio" : r.beds);
    else { v = r[c.key]; v = (v == null || v === "") ? "—" : v; }
    const cls = (c.cls ? c.cls : (c.num ? "num" : ""));
    const bg = (c.heat && heatRanges[c.key]) ? heatStyle(r[c.key], heatRanges[c.key][0], heatRanges[c.key][1]) : "";
    return `<td class="${cls}"${bg}>${v}</td>`;
  }).join("") + "</tr>").join("");

  $("emptyNote").style.display = rows.length ? "none" : "block";
  $("freshness").textContent = fmtAgo(DATA.generatedAt);
}

function decorate(d) {
  (d.listings || []).forEach(l => {
    l.pricePerSqft = (l.price != null && l.sqft) ? l.price / l.sqft : null;
  });
  return d;
}

async function load() {
  const r = await fetch("/data/asheville-rentals.json");
  DATA = decorate(await r.json());
  // renderSources();
  render();
}

// Local-only: re-scrape every source on demand. The refresh endpoint exists only
// on the local dev server (server.py); in production the button stays hidden.
async function refresh() {
  const btn = $("refreshBtn");
  const label = btn.textContent;
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>Scraping…';
  $("freshness").textContent = "Refreshing — re-scraping all sources (~1–2 min)…";
  try {
    const r = await fetch("/api/asheville-rentals/refresh", { method: "POST" });
    if (!r.ok) {
      const msg = (await r.json().catch(() => ({}))).error || `HTTP ${r.status}`;
      throw new Error(msg);
    }
    DATA = decorate(await r.json());
    render();
  } catch (e) {
    $("freshness").textContent = "Refresh failed: " + (e.message || e);
  } finally {
    btn.disabled = false;
    btn.textContent = label;
  }
}

// Reveal the refresh control only on the local dev server.
if (["localhost", "127.0.0.1", "[::1]"].includes(location.hostname)) {
  const btn = $("refreshBtn");
  btn.hidden = false;
  btn.addEventListener("click", refresh);
}

["q", "beds", "maxp", "wd"].forEach(id => {
  $(id).addEventListener("input", render);
});
load();
</script>
</body>
</html>
