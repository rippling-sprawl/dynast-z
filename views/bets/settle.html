<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>Settle Up | Dynast-Z</title>
  <link rel="stylesheet" href="/styles/base/styles.css?v=abec71e4">
  <link rel="stylesheet" href="/styles/primary/bets.css?v=bf3a91c2">
</head>
<body>
  <div id="header-mount"></div>
  <div id="nav-drawer-mount"></div>
  <script src="/scripts/base/auth.js?v=e9f1a2b3"></script>
  <script src="/scripts/base/nav.js?v=e5f6a7b8"></script>
  <script>initPage();</script>

  <main class="bets-content">
    <div class="bets-breadcrumbs"><a href="/">Home</a><span class="sep">/</span><a href="/bets">Bets</a><span class="sep">/</span><span>Settle Up</span></div>

    <h2 class="bets-h2">💰 Settle Up</h2>
    <p class="bets-sub">Where the money stands across all your bets, grouped by wager status.</p>

    <div class="bets-section-label">Wager Status Summary</div>
    <div id="settle-table"></div>
  </main>

  <script src="/scripts/primary/bets-api.js?v=c2e5f8b3"></script>
  <script src="/scripts/primary/bets.js?v=a4d6cf39"></script>
  <script>
    (async function () {
      if (!isLoggedIn()) { location.href = '/account'; return; }
      mountAuditBanner();
      await initBets();
      await loadTestBets();
      const ALL = allBetsWithSeedNewestFirst();
      const box = document.getElementById('settle-table');

      if (!ALL.length) {
        box.innerHTML = '<div class="bets-empty">No bets yet. <a href="/bets/place" style="color:#58a6ff">Track your first →</a></div>';
        return;
      }

      function plClass(n) { return n > 0 ? 'pos' : (n < 0 ? 'neg' : ''); }
      function signMoney(n) { return (n > 0 ? '+' : '') + fmtMoney(n); }

      // One summary row per wager_status, with null/empty grouped as "Missing".
      function blank() { return { bets: 0, staked: 0, toWin: 0, net: 0 }; }
      const groups = {};
      WAGER_STATUSES.forEach(s => { groups[s] = blank(); });
      groups[WAGER_STATUS_MISSING] = blank();

      for (const b of ALL) {
        const key = b.wager_status || WAGER_STATUS_MISSING;
        const g = groups[key] || (groups[key] = blank());
        g.bets += 1;
        g.staked += Number(b.stake) || 0;
        g.toWin += Number(b.to_win) || 0;
        const pl = profitLoss(b);
        if (pl !== null) g.net += pl;
      }

      // Display order: defined statuses first, then Missing, then any stragglers.
      const order = WAGER_STATUSES.concat([WAGER_STATUS_MISSING]);
      Object.keys(groups).forEach(k => { if (!order.includes(k)) order.push(k); });

      const totals = blank();
      const rows = order.map(key => {
        const g = groups[key];
        totals.bets += g.bets; totals.staked += g.staked;
        totals.toWin += g.toWin; totals.net += g.net;
        const label = key === WAGER_STATUS_MISSING
          ? key
          : key.charAt(0).toUpperCase() + key.slice(1);
        return '<tr>' +
            '<th scope="row">' + label + '</th>' +
            '<td class="perf-rec">' + g.bets + '</td>' +
            '<td>' + fmtMoney(g.staked) + '</td>' +
            '<td>' + fmtMoney(g.toWin) + '</td>' +
            '<td class="perf-pl ' + plClass(g.net) + '">' + signMoney(g.net) + '</td>' +
          '</tr>';
      }).join('');

      const totalRow =
        '<tr class="settle-total">' +
          '<th scope="row">All Bets</th>' +
          '<td class="perf-rec">' + totals.bets + '</td>' +
          '<td>' + fmtMoney(totals.staked) + '</td>' +
          '<td>' + fmtMoney(totals.toWin) + '</td>' +
          '<td class="perf-pl ' + plClass(totals.net) + '">' + signMoney(totals.net) + '</td>' +
        '</tr>';

      box.innerHTML =
        '<table class="perf-table settle-table">' +
          '<thead><tr>' +
            '<th scope="col">Wager Status</th><th scope="col">Bets</th>' +
            '<th scope="col">Staked</th><th scope="col">To Win</th>' +
            '<th scope="col">Net P/L</th>' +
          '</tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
          '<tfoot>' + totalRow + '</tfoot>' +
        '</table>';
    })();
  </script>
</body>
</html>
