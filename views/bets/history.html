<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>My History | Dynast-Z</title>
  <link rel="stylesheet" href="/styles/base/styles.css?v=abec71e4">
  <link rel="stylesheet" href="/styles/primary/bets.css?v=bf3a91c2">
</head>
<body>
  <div id="header-mount"></div>
  <div id="nav-drawer-mount"></div>
  <script src="/scripts/base/auth.js?v=e9f1a2b3"></script>
  <script src="/scripts/base/nav.js?v=e5f6a7b8"></script>
  <script>initPage();</script>

  <main class="bets-content">
    <div class="bets-breadcrumbs"><a href="/">Home</a><span class="sep">/</span><a href="/bets">Bets</a><span class="sep">/</span><span>My History</span></div>

    <h2 class="bets-h2">📜 My History</h2>
    
    <!-- Recent performance: fixed-window cards (Today / Yesterday / Last 7 / Last 30) -->
    <div class="bets-section-label">Recent Performance</div>
    <div class="perf-grid" id="perf-grid"></div>
    
    <div class="bets-section-label">All Time</div>
    <p class="bets-sub" id="history-sub">All your saved picks, pending and resolved.</p>

    <!-- Filters: league toggle chips + date-range preset chips + custom range -->
    <div class="bets-filters">
      <div class="filter-row" id="league-chips"></div>
      <div class="filter-row" id="range-chips"></div>
      <div class="filter-row range-custom">
        <input type="date" id="range-from" aria-label="From date">
        <span class="range-to-sep">to</span>
        <input type="date" id="range-to" aria-label="To date">
      </div>
    </div>

    <!-- Cumulative P/L graph (SVG injected by JS) -->
    <div class="pl-graph" id="pl-graph"></div>

    <div id="history-list" class="bet-list"></div>
  </main>

  <script src="/scripts/primary/bets-api.js?v=c2e5f8b3"></script>
  <script src="/scripts/primary/bets.js?v=a4d6cf39"></script>
  <script src="/scripts/primary/bet-tile.js?v=2100e385"></script>
  <script src="/scripts/primary/bets-history.js?v=1a2b3c4d"></script>
  <script>
    (async function () {
      if (!isLoggedIn()) { location.href = '/account'; return; }
      mountAuditBanner();
      await initBets();
      await loadTestBets();
      const els = {
        list: document.getElementById('history-list'),
        sub: document.getElementById('history-sub'),
        perf: document.getElementById('perf-grid'),
        leagueChips: document.getElementById('league-chips'),
        rangeChips: document.getElementById('range-chips'),
        from: document.getElementById('range-from'),
        to: document.getElementById('range-to'),
        graph: document.getElementById('pl-graph'),
      };
      renderBetsHistory(els, allBetsWithSeedNewestFirst());
    })();
  </script>
</body>
</html>
