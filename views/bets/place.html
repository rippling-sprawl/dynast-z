<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>Track a Bet | Dynast-Z</title>
  <link rel="stylesheet" href="/styles/base/styles.css?v=abec71e4">
  <link rel="stylesheet" href="/styles/primary/bets.css?v=e5f8b2d3">
</head>
<body>
  <div id="header-mount"></div>
  <div id="nav-drawer-mount"></div>
  <script src="/scripts/base/auth.js?v=e9f1a2b3"></script>
  <script src="/scripts/base/nav.js?v=e5f6a7b8"></script>
  <script>initPage();</script>

  <main class="bets-content">
    <div class="dupe-toast" id="dupe-toast" role="status">Dupe Created</div>
    <div class="bets-breadcrumbs"><a href="/">Home</a><span class="sep">/</span><a href="/bets">Bets</a><span class="sep">/</span><span id="crumb-leaf">Track a Bet</span></div>

    <h2 class="bets-h2" id="form-title">Track a Bet</h2>
    <p class="bets-sub">Enter your pick. Only league, your side, and stake are required.</p>

    <form class="bet-form" id="bet-form" autocomplete="off">
      <div class="bet-row">
        <div class="bet-field">
          <label for="f-league">League</label>
          <input id="f-league" placeholder="Select league">
        </div>
        <div class="bet-field">
          <label for="f-event-date">Event Date</label>
          <input id="f-event-date" type="date">
        </div>
      </div>

      <div class="bet-field">
        <label for="f-side">Your Side <span class="hint">— the team or player you're backing</span></label>
        <input id="f-side" placeholder="e.g. Bills">
      </div>

      <div class="bet-field">
        <label for="f-opponent">Opponent</label>
        <input id="f-opponent" placeholder="e.g. Chiefs">
      </div>

      <div class="bet-row" id="bet-type-row">
        <div class="bet-field">
          <label for="f-bet-type">Bet Type</label>
          <input id="f-bet-type" placeholder="Type">
        </div>
        <div class="bet-field" id="selection-field" style="flex:2">
          <label for="f-selection">The Bet <span class="hint">— e.g. "-3.5", "o27.5 pts"</span></label>
          <input id="f-selection" placeholder="e.g. -3.5">
        </div>
      </div>

      <div class="bet-row">
        <div class="bet-field">
          <label for="f-stake">Stake ($)</label>
          <input id="f-stake" placeholder="110">
        </div>
        <div class="bet-field">
          <label for="f-odds">Odds</label>
          <input id="f-odds" placeholder="-110">
        </div>
        <div class="bet-field">
          <label for="f-towin">To Win ($)</label>
          <input id="f-towin" placeholder="100">
        </div>
      </div>

      <div class="bet-row">
        <div class="bet-field">
          <label for="f-status">Event Status</label>
          <input id="f-status" placeholder="Status">
        </div>
        <div class="bet-field">
          <label for="f-wager-status">Wager Status</label>
          <input id="f-wager-status" placeholder="Unpaid">
        </div>
      </div>

      <div class="bets-section-label" style="margin-top:6px">Bet Preview</div>
      <div id="bet-preview" class="bet-list"></div>

      <div class="bet-error" id="form-error"></div>

      <div class="bet-form-actions">
        <button type="submit" class="bet-btn" id="save-btn">Save Bet</button>
        <a class="bet-btn secondary" href="/bets" style="text-align:center;text-decoration:none;line-height:1.4">Cancel</a>
      </div>
      <div class="bet-form-actions" id="delete-row" style="display:none">
        <button type="button" class="bet-btn secondary" id="duplicate-btn" title="Duplicate" aria-label="Duplicate">
          <svg class="bet-btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="9" y="9" width="11" height="11" rx="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
        </button>
        <button type="button" class="bet-btn danger" id="delete-btn" title="Delete this bet" aria-label="Delete this bet">
          <svg class="bet-btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 6h18"></path>
            <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path>
            <line x1="10" y1="11" x2="10" y2="17"></line>
            <line x1="14" y1="11" x2="14" y2="17"></line>
          </svg>
        </button>
      </div>
    </form>
  </main>

  <script src="/scripts/primary/bets-api.js?v=c2e5f8b3"></script>
  <script src="/scripts/primary/bets.js?v=b5e7d150"></script>
  <script src="/scripts/primary/combobox.js?v=882d6542"></script>
  <script src="/scripts/primary/bet-tile.js?v=3f21a640"></script>
  <script>
    (async function () {
      if (!isLoggedIn()) { location.href = '/account'; return; }
      mountAuditBanner();
      const LEAGUES = ['World Cup', 'NFL', 'NBA', 'Other'];
      // Status options come from bets.js (EVENT_STATUSES / WAGER_STATUSES).

      const params = new URLSearchParams(location.search);
      const editId = params.get('id');
      // Pull the user's bets so editing an existing bet finds it; load the seed
      // too so editing a test bet (id "t_...") still populates the form.
      await initBets();
      await loadTestBets();
      let existing = editId ? getBet(editId) : null;

      const el = id => document.getElementById(id);
      const fields = {
        league: el('f-league'), side: el('f-side'), opponent: el('f-opponent'),
        betType: el('f-bet-type'), selection: el('f-selection'),
        stake: el('f-stake'), odds: el('f-odds'), towin: el('f-towin'),
        eventDate: el('f-event-date'), status: el('f-status'),
        wagerStatus: el('f-wager-status'),
      };

      // Defaults (overridden below in edit mode). League defaults to the last
      // league the user submitted, persisted in local storage.
      const LEAGUE_KEY = 'bets:lastLeague';
      const savedLeague = localStorage.getItem(LEAGUE_KEY);
      fields.league.value = (savedLeague && LEAGUES.includes(savedLeague)) ? savedLeague : 'NFL';
      fields.status.value = 'pending';
      fields.betType.value = 'Spread';
      // Admins paying out their own bets settle immediately; auditing another
      // user (or being a normal user) keeps the standard 'unpaid' default.
      const adminSelf = (typeof isAdmin === 'function' && isAdmin())
        && !(typeof getAuditTarget === 'function' && getAuditTarget());
      fields.wagerStatus.value = adminSelf ? 'paid' : 'unpaid';
      // Default the event date to today (local parts to avoid a UTC off-by-one).
      const today = new Date();
      fields.eventDate.value =
        `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

      if (existing) {
        el('form-title').textContent = 'Edit Bet';
        el('crumb-leaf').textContent = 'Edit Bet';
        el('save-btn').textContent = 'Update Bet';
        el('delete-row').style.display = 'flex';
        document.title = 'Edit Bet | Dynast-Z';
        fields.league.value = existing.league || 'NFL';
        fields.side.value = existing.side || '';
        fields.opponent.value = existing.opponent || '';
        fields.betType.value = existing.bet_type || 'Spread';
        fields.selection.value = existing.selection || '';
        fields.stake.value = existing.stake != null ? existing.stake : '';
        fields.odds.value = existing.odds_american != null ? existing.odds_american : '';
        fields.towin.value = existing.to_win != null ? existing.to_win : '';
        fields.eventDate.value = existing.event_date || '';
        fields.status.value = existing.status || 'pending';
        fields.wagerStatus.value = existing.wager_status || '';
      }

      // Custom dropdowns (same UI for all four).
      const index = await loadIndex();
      attachCombobox(fields.league, () => LEAGUES, { selectOnly: true });
      attachCombobox(fields.status, () => EVENT_STATUSES, { selectOnly: true, capitalize: true });
      attachCombobox(fields.wagerStatus, () => WAGER_STATUSES, { selectOnly: true, capitalize: true });
      // No capitalize: option labels ("ML") are already correctly cased.
      attachCombobox(fields.betType, () => BET_TYPES, { selectOnly: true });
      attachCombobox(fields.side, () => sideSuggestions(index, fields.league.value));
      attachCombobox(fields.opponent, () => teamSuggestions(index, fields.league.value));

      // "The Bet" is redundant for a moneyline pick — hide it (and drop any stale
      // text) whenever the bet type is ML.
      function syncBetTypeUI() {
        const isML = fields.betType.value === 'ML';
        el('selection-field').style.display = isML ? 'none' : '';
        if (isML) fields.selection.value = '';
      }
      fields.betType.addEventListener('change', () => { syncBetTypeUI(); updatePreview(); });
      syncBetTypeUI();

      // Match is derived (Side vs Opponent), not an input — shown in the preview.
      function matchString() {
        const s = fields.side.value.trim(), o = fields.opponent.value.trim();
        return s && o ? (s + ' vs ' + o) : (s || o || '');
      }

      // Live bet preview: build a draft bet and render it with the shared tile.
      function draftBet() {
        const odds = fields.odds.value;
        return {
          league: fields.league.value,
          side: fields.side.value.trim(),
          opponent: fields.opponent.value.trim(),
          match: matchString(),
          bet_type: fields.betType.value,
          selection: fields.selection.value.trim(),
          stake: fields.stake.value ? Number(fields.stake.value) : '',
          odds_american: odds ? Number(odds) : null,
          to_win: fields.towin.value ? Number(fields.towin.value) : null,
          event_date: fields.eventDate.value || '',
          status: fields.status.value,
          wager_status: fields.wagerStatus.value || null,
        };
      }
      function updatePreview() {
        const box = el('bet-preview');
        if (!fields.side.value.trim()) {
          box.innerHTML = '<div class="bets-empty">Waiting for your bet...</div>';
          return;
        }
        box.innerHTML = renderBetTile(draftBet(), { actions: false });
      }
      el('bet-form').addEventListener('input', updatePreview);
      el('bet-form').addEventListener('change', updatePreview);

      // Bidirectional stake <-> to-win, anchored on odds.
      function profitMultiplier() {
        const d = americanToDecimal(fields.odds.value);
        return d ? d - 1 : null;
      }
      fields.stake.addEventListener('input', () => {
        const m = profitMultiplier();
        if (m == null || fields.stake.value === '') return;
        fields.towin.value = (Number(fields.stake.value) * m).toFixed(2);
      });
      fields.towin.addEventListener('input', () => {
        const m = profitMultiplier();
        if (m == null || fields.towin.value === '') return;
        fields.stake.value = (Number(fields.towin.value) / m).toFixed(2);
      });
      fields.odds.addEventListener('input', () => {
        const m = profitMultiplier();
        if (m == null) return;
        if (fields.stake.value !== '') fields.towin.value = (Number(fields.stake.value) * m).toFixed(2);
        else if (fields.towin.value !== '') fields.stake.value = (Number(fields.towin.value) / m).toFixed(2);
      });

      // Enter commits a field but never submits the bet — only the button does.
      el('bet-form').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') e.preventDefault();
      });

      el('bet-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const err = el('form-error');
        err.textContent = '';

        const side = fields.side.value.trim();
        const stake = fields.stake.value;
        if (!side) { err.textContent = 'Enter the team or player you\'re backing.'; return; }
        if (!stake || Number(stake) <= 0) { err.textContent = 'Enter a stake greater than 0.'; return; }

        const odds = fields.odds.value;
        const bet = Object.assign({}, existing || {}, {
          league: fields.league.value,
          side: side,
          opponent: fields.opponent.value.trim(),
          match: matchString(),
          bet_type: fields.betType.value,
          selection: fields.selection.value.trim(),
          stake: Number(stake),
          odds_american: odds ? Number(odds) : null,
          odds_decimal: odds ? americanToDecimal(odds) : null,
          to_win: fields.towin.value ? Number(fields.towin.value) : toWinFromOdds(stake, odds),
          event_date: fields.eventDate.value || '',
          status: fields.status.value,
          wager_status: fields.wagerStatus.value || null,
        });

        // Remember this league as the default for the next bet.
        localStorage.setItem(LEAGUE_KEY, fields.league.value);

        upsertBet(bet);
        location.href = '/bets';
      });

      // Fixed "Dupe Created" toast at the top of the form. It stays until the
      // user edits any field (not on a timer), so the {once:true} input listener
      // fades it on the first change after duplicating.
      function showDupeToast() {
        el('dupe-toast').classList.add('visible');
        el('bet-form').addEventListener('input', hideDupeToast, { once: true });
      }
      function hideDupeToast() { el('dupe-toast').classList.remove('visible'); }

      // Duplicate: turn the edit form into a pre-filled new-bet form. Clearing
      // `existing` means the next save has no id, so upsertBet inserts a new row
      // (and only the explicit "Save Bet" submit writes to Supabase).
      el('duplicate-btn').addEventListener('click', () => {
        existing = null;
        el('form-title').textContent = 'Track a Bet';
        el('crumb-leaf').textContent = 'Track a Bet';
        el('save-btn').textContent = 'Save Bet';
        el('delete-row').style.display = 'none';
        el('form-error').textContent = '';
        document.title = 'Track a Bet | Dynast-Z';
        history.replaceState(null, '', '/bets/place');
        showDupeToast();
      });

      el('delete-btn').addEventListener('click', () => {
        if (!existing) return;
        if (confirm('Delete this bet? This cannot be undone.')) {
          deleteBet(existing.id);
          location.href = '/bets';
        }
      });

      // Arriving with ?duplicate=1 (from a tile's quick-action modal) pre-fills
      // from the source bet, then runs the same Duplicate flow as the button.
      if (existing && params.get('duplicate')) el('duplicate-btn').click();

      updatePreview();
    })();
  </script>
</body>
</html>
