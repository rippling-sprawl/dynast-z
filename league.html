<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynast-Z - League</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      height: auto;
      overflow: auto;
      padding: 0;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #f0f6fc;
    }

    header a {
      color: #8b949e;
      text-decoration: none;
      font-size: 13px;
    }

    header a:hover { color: #58a6ff; }

    #header-status {
      color: #8b949e;
      font-size: 14px;
    }

    .league-content {
      max-width: 620px;
      margin: 0 auto;
      padding: 16px;
    }

    #loading {
      text-align: center;
      padding: 48px 16px;
      color: #8b949e;
      font-size: 14px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid #30363d;
      margin-bottom: 16px;
    }

    .tab {
      display: block;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      color: #8b949e;
      text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab:hover { color: #e1e4e8; }

    .tab.active {
      color: #f0f6fc;
      border-bottom-color: #58a6ff;
    }

    /* Section shared */
    .section {
      margin-bottom: 24px;
    }

    .placeholder {
      padding: 24px 16px;
      text-align: center;
      color: #484f58;
      font-size: 14px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
    }

    /* Rosters tab */
    .team-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      margin-right: 12px;
      flex-shrink: 0;
      background: #21262d;
      object-fit: cover;
    }

    .team-card-info {
      display: flex;
      align-items: center;
      flex: 1;
      min-width: 0;
    }

    .team-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      margin-bottom: 8px;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }

    .team-card:hover {
      background: #1c2128;
      border-color: #58a6ff;
    }

    .team-name {
      font-size: 15px;
      font-weight: 500;
      color: #f0f6fc;
    }

    .team-owner {
      font-size: 12px;
      color: #8b949e;
    }

    .team-arrow {
      color: #484f58;
      font-size: 14px;
    }

    .team-card:hover .team-arrow {
      color: #58a6ff;
    }

    .sleeper-link {
      display: inline-block;
      margin-top: 8px;
      font-size: 12px;
      color: #58a6ff;
      text-decoration: none;
    }

    .sleeper-link:hover {
      text-decoration: underline;
    }


    /* Hamburger nav */
    .hamburger {
      background: none;
      border: none;
      color: #8b949e;
      font-size: 22px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      display: flex;
      align-items: center;
    }

    .hamburger:hover { color: #f0f6fc; }

    .nav-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0, 0, 0, 0.5);
    }

    .nav-overlay.open { display: block; }

    .nav-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: 280px;
      max-width: 80vw;
      height: 100%;
      background: #161b22;
      border-left: 1px solid #30363d;
      z-index: 201;
      padding: 16px 0;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.2s ease;
    }

    .nav-overlay.open .nav-drawer {
      transform: translateX(0);
    }

    .nav-drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 12px;
      border-bottom: 1px solid #30363d;
      margin-bottom: 8px;
    }

    .nav-drawer-header h2 {
      font-size: 16px;
      font-weight: 600;
      color: #f0f6fc;
    }

    .nav-close {
      background: none;
      border: none;
      color: #8b949e;
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }

    .nav-close:hover { color: #f0f6fc; }

    .nav-drawer ul {
      list-style: none;
    }

    .nav-drawer li {
      margin: 0;
    }

    .nav-drawer a {
      display: block;
      padding: 10px 20px;
      color: #58a6ff;
      text-decoration: none;
      font-size: 14px;
      transition: background 0.1s;
    }

    .nav-drawer a:hover {
      background: #1c2128;
    }

    .nav-drawer .nav-section-label {
      display: block;
      padding: 10px 20px 4px;
      font-size: 12px;
      font-weight: 600;
      color: #484f58;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .nav-drawer .nav-sub a {
      padding-left: 36px;
      font-size: 13px;
    }

    @media (max-width: 500px) {
      .league-content {
        padding: 12px;
      }

      .tabs {
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <header>
    <div style="display: flex; align-items: center; gap: 12px;">
      <button class="hamburger" id="nav-toggle" aria-label="Menu">&#9776;</button>
      <h1><a href="/" style="color: inherit; text-decoration: none;">Dynast-Z</a></h1>
    </div>
    <span id="header-status">Loading league...</span>
  </header>

  <div id="nav-drawer-mount"></div>
  <script src="nav.js"></script>
  <script>initNavDrawer();</script>

  <div class="league-content">
    <div id="loading">Loading league...</div>

    <div id="sections" style="display: none;">
      <div class="tabs" id="tab-bar"></div>

      <div id="teams-list"></div>
      <a id="sleeper-link" class="sleeper-link" href="#" target="_blank"></a>
    </div>
  </div>

  <script>
    const leagueId = window.location.pathname.match(/\/league\/([^/]+)/)[1];

    // Build tab bar
    const tabs = [
      { label: 'Rosters', href: `/league/${leagueId}` },
      { label: 'Latest Trades', href: `/league/${leagueId}/new-trades` },
      { label: 'Past Trades', href: `/league/${leagueId}/trades` },
      { label: 'Power Rankings', href: `/league/${leagueId}/power` },
    ];
    const currentPath = window.location.pathname.replace(/\/$/, '');
    document.getElementById('tab-bar').innerHTML = tabs.map(t => {
      const isActive = currentPath === t.href ? ' active' : '';
      return `<a class="tab${isActive}" href="${t.href}">${t.label}</a>`;
    }).join('');

    async function loadLeague() {
      try {
        const resp = await fetch(`/api/league/${leagueId}/teams`);
        const data = await resp.json();
        if (data.error) throw new Error(data.error);

        document.title = `Dynast-Z - ${data.league_name}`;
        document.getElementById('header-status').textContent = data.league_name;
        document.getElementById('loading').style.display = 'none';
        document.getElementById('sections').style.display = '';

        const sleeperLink = document.getElementById('sleeper-link');
        sleeperLink.href = `https://sleeper.com/leagues/${leagueId}`;
        sleeperLink.textContent = 'View on Sleeper';

        const container = document.getElementById('teams-list');
        container.innerHTML = data.teams.map(t => `
          <a href="/league/${leagueId}/team/${t.roster_id}" class="team-card">
            <div class="team-card-info">
              ${t.avatar ? `<img class="team-avatar" src="${t.avatar}" alt="" referrerpolicy="no-referrer">` : `<div class="team-avatar"></div>`}
              <div>
                <div class="team-name">${t.team_name}</div>
                <div class="team-owner">${t.display_name}</div>
              </div>
            </div>
            <span class="team-arrow">&#8250;</span>
          </a>
        `).join('');
      } catch (e) {
        document.getElementById('loading').textContent = 'Error: ' + e.message;
      }
    }

    loadLeague();
  </script>
</body>
</html>
