<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynasty Trade Calculator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      height: 100vh;
      overflow: hidden;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #f0f6fc;
    }

    #loading {
      color: #8b949e;
      font-size: 14px;
    }

    .app {
      display: flex;
      height: calc(100vh - 49px);
    }

    /* Player List (left panel) */
    .player-pool {
      width: 340px;
      min-width: 340px;
      border-right: 1px solid #30363d;
      display: flex;
      flex-direction: column;
      background: #0d1117;
    }

    .panel-header {
      padding: 12px 16px;
      border-bottom: 1px solid #30363d;
      background: #161b22;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .panel-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: #f0f6fc;
    }

    .panel-header .count {
      font-size: 12px;
      color: #8b949e;
      background: #21262d;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .search-bar {
      padding: 8px 16px;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
      display: flex;
      gap: 8px;
    }

    .search-bar input {
      flex: 1;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 6px 10px;
      color: #e1e4e8;
      font-size: 13px;
      outline: none;
    }

    .search-bar input:focus {
      border-color: #58a6ff;
    }

    .position-filters {
      display: flex;
      gap: 4px;
    }

    .pos-filter {
      background: #21262d;
      border: 1px solid #30363d;
      color: #8b949e;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
    }

    .pos-filter.active {
      background: #1f6feb;
      border-color: #1f6feb;
      color: #fff;
    }

    .player-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    .player-list::-webkit-scrollbar { width: 8px; }
    .player-list::-webkit-scrollbar-track { background: transparent; }
    .player-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }

    /* Player card */
    .player-card {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      cursor: grab;
      border-bottom: 1px solid #21262d;
      transition: background 0.1s;
      user-select: none;
    }

    .player-card:hover { background: #161b22; }
    .player-card.dragging { opacity: 0.4; }

    .player-pos {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 3px;
      margin-right: 10px;
      min-width: 30px;
      text-align: center;
    }

    .pos-QB { background: #c2185b; color: #fff; }
    .pos-RB { background: #1565c0; color: #fff; }
    .pos-WR { background: #2e7d32; color: #fff; }
    .pos-TE { background: #e65100; color: #fff; }
    .pos-K { background: #6a1b9a; color: #fff; }
    .pos-DEF { background: #4e342e; color: #fff; }

    .player-info {
      flex: 1;
      min-width: 0;
    }

    .player-name {
      font-size: 13px;
      font-weight: 500;
      color: #f0f6fc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-team {
      font-size: 11px;
      color: #8b949e;
    }

    .player-value {
      font-size: 14px;
      font-weight: 600;
      color: #58a6ff;
      margin-left: 8px;
      white-space: nowrap;
    }

    /* Trade columns */
    .trade-area {
      flex: 1;
      display: flex;
      gap: 0;
    }

    .team-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #30363d;
    }

    .team-column:last-child { border-right: none; }

    .team-header {
      padding: 12px 16px;
      border-bottom: 1px solid #30363d;
      background: #161b22;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .team-header h2 {
      font-size: 14px;
      font-weight: 600;
    }

    .team-a .team-header h2 { color: #f78166; }
    .team-b .team-header h2 { color: #7ee787; }

    .team-total {
      font-size: 20px;
      font-weight: 700;
    }

    .team-a .team-total { color: #f78166; }
    .team-b .team-total { color: #7ee787; }

    .team-drop-zone {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      min-height: 100px;
      transition: background 0.15s;
    }

    .team-drop-zone::-webkit-scrollbar { width: 8px; }
    .team-drop-zone::-webkit-scrollbar-track { background: transparent; }
    .team-drop-zone::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }

    .team-drop-zone.drag-over {
      background: rgba(56, 139, 253, 0.08);
    }

    .drop-hint {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #484f58;
      font-size: 13px;
      pointer-events: none;
    }

    /* Team player cards */
    .team-player {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      margin-bottom: 6px;
    }

    .team-player .remove-btn {
      background: none;
      border: none;
      color: #484f58;
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
      margin-left: 8px;
      line-height: 1;
    }

    .team-player .remove-btn:hover { color: #f85149; }

    /* Trade result banner */
    .trade-result {
      padding: 12px 16px;
      border-top: 1px solid #30363d;
      background: #161b22;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .trade-result .diff {
      font-size: 16px;
      font-weight: 700;
    }

    .trade-result .label {
      font-size: 13px;
      color: #8b949e;
    }

    .trade-result .favor-a { color: #f78166; }
    .trade-result .favor-b { color: #7ee787; }
    .trade-result .favor-even { color: #8b949e; }

    /* Source tooltip */
    .player-value { position: relative; }
    .player-value[data-sources]:hover::after {
      content: attr(data-sources);
      position: absolute;
      bottom: 100%;
      right: 0;
      background: #1c2128;
      border: 1px solid #30363d;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 11px;
      white-space: pre;
      z-index: 10;
      color: #8b949e;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>Dynasty Trade Calculator</h1>
    <div id="loading">Loading players...</div>
  </header>
  <div class="app">
    <div class="player-pool">
      <div class="panel-header">
        <h2>Players</h2>
        <span class="count" id="player-count">0</span>
      </div>
      <div class="search-bar">
        <input type="text" id="search" placeholder="Search players...">
        <div class="position-filters">
          <button class="pos-filter active" data-pos="ALL">All</button>
          <button class="pos-filter" data-pos="QB">QB</button>
          <button class="pos-filter" data-pos="RB">RB</button>
          <button class="pos-filter" data-pos="WR">WR</button>
          <button class="pos-filter" data-pos="TE">TE</button>
        </div>
      </div>
      <div class="player-list" id="player-list"></div>
    </div>

    <div class="trade-area">
      <div class="team-column team-a">
        <div class="team-header">
          <h2>Team A</h2>
          <span class="team-total" id="total-a">0</span>
        </div>
        <div class="team-drop-zone" id="drop-a" data-team="a">
          <div class="drop-hint" id="hint-a">Drag players here</div>
        </div>
      </div>
      <div class="team-column team-b">
        <div class="team-header">
          <h2>Team B</h2>
          <span class="team-total" id="total-b">0</span>
        </div>
        <div class="team-drop-zone" id="drop-b" data-team="b">
          <div class="drop-hint" id="hint-b">Drag players here</div>
        </div>
      </div>
    </div>
  </div>

  <div class="trade-result" id="trade-result">
    <span class="label">Add players to compare</span>
  </div>

  <script>
    let allPlayers = [];
    let teamA = [];
    let teamB = [];
    let searchQuery = '';
    let posFilter = 'ALL';

    // Fetch players from our proxy API
    async function loadPlayers() {
      try {
        const resp = await fetch('/api/players');
        const data = await resp.json();
        if (data.error) throw new Error(data.error);
        allPlayers = data;
        document.getElementById('loading').textContent = `${allPlayers.length} players loaded (Superflex)`;
        renderPlayerList();
      } catch (e) {
        document.getElementById('loading').textContent = 'Error loading: ' + e.message;
      }
    }

    function getAvailablePlayers() {
      const assigned = new Set([
        ...teamA.map(p => p.name),
        ...teamB.map(p => p.name),
      ]);
      return allPlayers.filter(p => {
        if (assigned.has(p.name)) return false;
        if (posFilter !== 'ALL' && p.position !== posFilter) return false;
        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          return p.name.toLowerCase().includes(q) ||
                 p.team.toLowerCase().includes(q) ||
                 p.position.toLowerCase().includes(q);
        }
        return true;
      });
    }

    function fmtZ(z) {
      const sign = z >= 0 ? '+' : '';
      return sign + z.toFixed(2);
    }

    function sourcesTooltip(sources) {
      return Object.entries(sources)
        .map(([k, v]) => `${k}: ${v.toLocaleString()} (raw)`)
        .join('\n');
    }

    function renderPlayerList() {
      const list = document.getElementById('player-list');
      const available = getAvailablePlayers();
      document.getElementById('player-count').textContent = available.length;

      list.innerHTML = available.map(p => `
        <div class="player-card" draggable="true" data-name="${p.name.replace(/"/g, '&quot;')}">
          <span class="player-pos pos-${p.position}">${p.position}</span>
          <div class="player-info">
            <div class="player-name">${p.name}</div>
            <div class="player-team">${p.team}</div>
          </div>
          <span class="player-value" data-sources="${sourcesTooltip(p.sources)}">${fmtZ(p.aggregate)}</span>
        </div>
      `).join('');

      // Attach drag events
      list.querySelectorAll('.player-card').forEach(card => {
        card.addEventListener('dragstart', e => {
          e.dataTransfer.setData('text/plain', card.dataset.name);
          card.classList.add('dragging');
        });
        card.addEventListener('dragend', () => card.classList.remove('dragging'));
      });
    }

    function renderTeam(team, containerId, hintId) {
      const container = document.getElementById(containerId);
      const hint = document.getElementById(hintId);
      // Remove existing team-player cards
      container.querySelectorAll('.team-player').forEach(el => el.remove());
      hint.style.display = team.length ? 'none' : 'flex';

      team.forEach(p => {
        const el = document.createElement('div');
        el.className = 'team-player';
        el.innerHTML = `
          <span class="player-pos pos-${p.position}">${p.position}</span>
          <div class="player-info">
            <div class="player-name">${p.name}</div>
            <div class="player-team">${p.team}</div>
          </div>
          <span class="player-value">${fmtZ(p.aggregate)}</span>
          <button class="remove-btn" data-name="${p.name.replace(/"/g, '&quot;')}">&times;</button>
        `;
        el.querySelector('.remove-btn').addEventListener('click', () => {
          removePlayer(p.name);
        });
        container.insertBefore(el, hint);
      });
    }

    function removePlayer(name) {
      teamA = teamA.filter(p => p.name !== name);
      teamB = teamB.filter(p => p.name !== name);
      updateAll();
    }

    function updateTotals() {
      const sumA = teamA.reduce((s, p) => s + p.aggregate, 0);
      const sumB = teamB.reduce((s, p) => s + p.aggregate, 0);
      document.getElementById('total-a').textContent = fmtZ(sumA);
      document.getElementById('total-b').textContent = fmtZ(sumB);

      const result = document.getElementById('trade-result');
      if (teamA.length === 0 && teamB.length === 0) {
        result.innerHTML = '<span class="label">Add players to compare</span>';
      } else {
        const diff = Math.abs(sumA - sumB);
        let cls, text;
        if (sumA > sumB) {
          cls = 'favor-a';
          text = `Team A wins by ${fmtZ(diff)}`;
        } else if (sumB > sumA) {
          cls = 'favor-b';
          text = `Team B wins by ${fmtZ(diff)}`;
        } else {
          cls = 'favor-even';
          text = 'Even trade';
        }
        result.innerHTML = `
          <span class="label">Team A: ${fmtZ(sumA)}</span>
          <span class="diff ${cls}">${text}</span>
          <span class="label">Team B: ${fmtZ(sumB)}</span>
        `;
      }
    }

    function updateAll() {
      renderPlayerList();
      renderTeam(teamA, 'drop-a', 'hint-a');
      renderTeam(teamB, 'drop-b', 'hint-b');
      updateTotals();
    }

    // Drop zone setup
    ['drop-a', 'drop-b'].forEach(id => {
      const zone = document.getElementById(id);
      const team = id === 'drop-a' ? 'a' : 'b';

      zone.addEventListener('dragover', e => {
        e.preventDefault();
        zone.classList.add('drag-over');
      });

      zone.addEventListener('dragleave', () => {
        zone.classList.remove('drag-over');
      });

      zone.addEventListener('drop', e => {
        e.preventDefault();
        zone.classList.remove('drag-over');
        const name = e.dataTransfer.getData('text/plain');
        const player = allPlayers.find(p => p.name === name);
        if (!player) return;

        // Remove from other team if present
        teamA = teamA.filter(p => p.name !== name);
        teamB = teamB.filter(p => p.name !== name);

        if (team === 'a') teamA.push(player);
        else teamB.push(player);

        updateAll();
      });
    });

    // Search
    document.getElementById('search').addEventListener('input', e => {
      searchQuery = e.target.value;
      renderPlayerList();
    });

    // Position filters
    document.querySelectorAll('.pos-filter').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.pos-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        posFilter = btn.dataset.pos;
        renderPlayerList();
      });
    });

    loadPlayers();
  </script>
</body>
</html>
