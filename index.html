<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynast-Z</title>
  <link rel="stylesheet" href="styles.css?v=4">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      min-height: 100vh;
      padding: 48px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #f0f6fc;
      margin-bottom: 32px;
    }

    nav {
      width: 100%;
      max-width: 480px;
    }

    nav ul {
      list-style: none;
    }

    nav > ul > li {
      margin-bottom: 16px;
    }

    nav a {
      display: block;
      padding: 12px 16px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #58a6ff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
    }

    nav a:hover {
      background: #1c2128;
      border-color: #58a6ff;
    }

    nav ul ul {
      margin-top: 8px;
      padding-left: 24px;
    }

    nav ul ul li {
      margin-bottom: 8px;
    }

    nav ul ul a {
      font-size: 14px;
      padding: 10px 16px;
      background: #0d1117;
    }

    .section-label {
      display: block;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 500;
      color: #f0f6fc;
    }

  </style>
</head>
<body>
  <h1>Dynast-Z</h1>
  <nav>
    <ul>
      <li>
        <a href="/trade-calculator">Zee Trade Calculator</a>
      </li>
      <li>
        <span class="section-label">Leagues</span>
        <ul>
          <li><a href="/league/1314983622930870272">JHBC</a></li>
          <li><a href="/league/1257450392124407809">Keepers &amp; Weepers</a></li>
          <!--<li><a href="/league/1340070186379673600">Cut Throat</a></li>-->
        </ul>
      </li>
      <li>
        <a href="https://sharplystupid.substack.com/">Sharply Stupid Blog</a>
      </li>
    </ul>
  </nav>
</body>
</html>
